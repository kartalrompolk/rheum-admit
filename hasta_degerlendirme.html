<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHEUM-ADMIT — Değerlendirme Panosu</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#0f1117; --surface:#181c27; --surface2:#1e2336;
  --border:#2a3050; --accent:#4f8ef7; --accent2:#7c6af7;
  --text:#e8ecf5; --text2:#8892b0;
  --success:#4ff79e; --danger:#f74f4f; --warn:#f7a74f;
  --male:#4f8ef7; --female:#f76fa8;
  --devir:#f7a74f; --A-color:#f74f4f;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}

/* HEADER */
.topbar{background:#0d1520;border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.topbar h1{font-size:1.1rem;color:var(--accent);flex-shrink:0}
.topbar-actions{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
.btn{padding:7px 16px;border-radius:8px;border:none;font-size:0.82rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-warn{background:var(--warn);color:#000}
.btn:hover{opacity:.85}

/* FILTERS */
.filters{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:0.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:0.78rem;cursor:pointer;transition:all .2s}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-btn.gender-erkek{color:var(--male)}.filter-btn.gender-erkek.active{background:var(--male);color:#fff;border-color:var(--male)}
.filter-btn.gender-kadin{color:var(--female)}.filter-btn.gender-kadin.active{background:var(--female);color:#fff;border-color:var(--female)}
.filter-sep{width:1px;height:20px;background:var(--border)}

/* BOARD */
.board{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0;padding:0;height:calc(100vh - 110px)}
.col{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.col:last-child{border-right:none}
.col-header{padding:12px 14px;border-bottom:1px solid var(--border);background:var(--surface);font-size:0.85rem;font-weight:700;display:flex;align-items:center;gap:8px;flex-shrink:0}
.col-header .count{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:2px 8px;font-size:0.72rem;color:var(--text2);margin-left:auto}
.col-body{flex:1;overflow-y:auto;padding:8px}
.col-body::-webkit-scrollbar{width:4px}
.col-body::-webkit-scrollbar-track{background:transparent}
.col-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* CARDS */
.card{border-radius:10px;border:1px solid var(--border);background:var(--surface);margin-bottom:6px;cursor:pointer;transition:border-color .2s,transform .1s;position:relative;overflow:hidden}
.card:hover{border-color:var(--accent);transform:translateY(-1px)}
.card.male{border-left:3px solid var(--male)}
.card.female{border-left:3px solid var(--female)}
.card.devir{border-left:3px solid var(--devir)}
.card.pinned{background:#1a2030;border-color:var(--warn)}
.card.pinned::before{content:'📌';position:absolute;top:6px;right:8px;font-size:0.75rem}
.card.locked::after{content:'🔒';position:absolute;top:6px;right:28px;font-size:0.72rem}

.arrow-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);width:24px;height:24px;border-radius:5px;cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.arrow-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.arrow-btn:disabled{opacity:.2;cursor:not-allowed}
.card-body{flex:1}
.card-inner{display:flex;align-items:stretch}
.arrow-wrap{display:flex;flex-direction:column;gap:2px;padding:6px 6px;border-left:1px solid transparent;flex-shrink:0;justify-content:center;align-items:center;position:relative;transition:border-color .15s}
.arrow-wrap .arrow-name{position:absolute;right:44px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:0.75rem;padding:4px 8px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:10}
.arrow-wrap .arrow-btn{opacity:0;transition:opacity .15s}
.arrow-wrap:hover{border-left-color:var(--border)}
.arrow-wrap:hover .arrow-btn{opacity:1}
.arrow-wrap:hover .arrow-name{opacity:1}

.card-body{padding:10px 12px}
.card-name{font-size:0.9rem;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.card-name .badge-a{background:rgba(247,79,79,.2);color:var(--A-color);border:1px solid var(--A-color);border-radius:4px;font-size:0.65rem;padding:1px 5px;font-weight:700}
.card-name .badge-devir{background:rgba(247,167,79,.2);color:var(--devir);border:1px solid var(--devir);border-radius:4px;font-size:0.65rem;padding:1px 5px;font-weight:700}
.card-name .badge-doktor{background:rgba(79,247,158,.15);color:#4ff79e;border:1px solid #4ff79e;border-radius:4px;font-size:0.65rem;padding:1px 5px;font-weight:700}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.card-score{font-family:'Courier New',monospace;font-size:0.85rem;font-weight:700;color:var(--accent)}
.card-score.high{color:var(--A-color)}
.card-days{font-size:0.75rem;color:var(--text2)}
.card-gender{font-size:0.72rem;padding:2px 7px;border-radius:10px;font-weight:600}
.card-gender.male{background:rgba(79,142,247,.15);color:var(--male)}
.card-gender.female{background:rgba(247,111,168,.15);color:var(--female)}
.card-note{margin-top:6px;font-size:0.75rem;color:var(--text2);background:var(--surface2);border-radius:6px;padding:5px 8px;border-left:2px solid var(--accent2)}

/* DRAG */

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.modal-header h2{font-size:1rem;flex:1}
.modal-close{background:var(--surface2);border:1px solid var(--border);color:var(--text2);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.modal-body{padding:18px 20px}
.detail-row{display:flex;gap:8px;margin-bottom:8px;font-size:0.85rem}
.detail-label{color:var(--text2);width:140px;flex-shrink:0}
.detail-value{color:var(--text);flex:1}
.detail-divider{border:none;border-top:1px solid var(--border);margin:10px 0}
.note-area{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:0.85rem;padding:10px;border-radius:8px;resize:vertical;min-height:80px;outline:none;margin-top:6px}
.note-area:focus{border-color:var(--accent)}
.score-badge{display:inline-block;background:rgba(247,79,79,.15);color:var(--A-color);border:1px solid var(--A-color);border-radius:6px;padding:3px 10px;font-family:'Courier New',monospace;font-size:1.1rem;font-weight:700;margin-bottom:10px}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 22px;border-radius:10px;font-size:0.85rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:300;white-space:nowrap}
#toast.show{opacity:1}
#toast.success{border-color:var(--success);color:var(--success)}
#toast.error{border-color:var(--danger);color:var(--danger)}

/* LOAD ZONE */
.load-zone{border:2px dashed var(--border);border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:border-color .2s;margin:20px}
.load-zone:hover{border-color:var(--accent)}
.load-zone p{color:var(--text2);font-size:0.9rem;margin-top:8px}

@media(max-width:700px){.board{grid-template-columns:1fr}.col{height:auto;max-height:60vh}.filters{display:none}}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<body>

<div class="topbar">
  <h1>🏥 RHEUM-ADMIT Değerlendirme</h1>
  <span id="sync-countdown" style="font-size:0.75rem;color:var(--text2);font-family:monospace;background:var(--surface2);padding:3px 10px;border-radius:6px;border:1px solid var(--border)">☁ --:--</span>
  <div class="topbar-actions">
    <button class="btn btn-secondary" onclick="document.getElementById('json-input').click()">📂 JSON Yükle</button>
    <button class="btn btn-secondary" style="color:var(--accent2);border-color:var(--accent2)" onclick="openTakvim()">📅 + Randevu</button>
    <button class="btn btn-secondary" id="drive-sync-btn" onclick="syncFromDrive()" style="color:#4ff79e;border-color:#4ff79e">☁ Drive Sync</button>
    <button class="btn btn-secondary" onclick="saveState()">💾 Durumu Kaydet</button>
    <button class="btn btn-primary" onclick="exportExcel()">📊 Excel İndir</button>
    <button class="btn btn-secondary" style="color:var(--danger);border-color:var(--danger)" onclick="resetAll()">🗑 Sıfırla</button>

</div>

  <span class="filter-label">Cinsiyet:</span>
  <button class="filter-btn active" onclick="setFilter('gender','all',this)">Tümü</button>
  <button class="filter-btn gender-erkek" onclick="setFilter('gender','Erkek',this)">Erkek</button>
  <button class="filter-btn gender-kadin" onclick="setFilter('gender','Kadın',this)">Kadın</button>
  <div class="filter-sep"></div>
  <span class="filter-label">Sıralama:</span>
  <button class="filter-btn active" onclick="setSort('default',this)" id="sort-default">Varsayılan</button>
  <button class="filter-btn" onclick="setSort('score',this)" id="sort-score">Puana Göre ↓</button>
  <button class="filter-btn" onclick="setSort('days',this)" id="sort-days">Güne Göre ↓</button>
</div>

<div class="board">
  <div class="col" id="col-tani">
    <div class="col-header">
      <span>🔴</span> Tanı / Tedavi
      <span class="count" id="cnt-tani">0</span>
    </div>
    <div class="col-body" id="body-tani"></div>
  </div>
  <div class="col" id="col-egitim">
    <div class="col-header">
      <span>🟡</span> İlaç Eğitimi
      <span class="count" id="cnt-egitim">0</span>
    </div>
    <div class="col-body" id="body-egitim"></div>
  </div>
  <div class="col" id="col-uygulama">
    <div class="col-header">
      <span>🟢</span> İlaç Uygulaması
      <span class="count" id="cnt-uygulama">0</span>
    </div>
    <div class="col-body" id="body-uygulama"></div>
  </div>
  <div class="col" id="col-randevu">
    <div class="col-header">
      <span>📅</span> Taburcu / Randevu
      <span class="count" id="cnt-randevu">0</span>
    </div>
    <div class="col-body" id="body-randevu"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <div class="modal-header">
      <h2 id="modal-title">Hasta Detayı</h2>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- TAKVİM MODAL -->
<div class="modal-overlay" id="takvim-modal" style="display:none" onclick="closeTakvimModal(event)">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h2>📅 Randevu / Taburcu</h2>
      <button class="modal-close" onclick="document.getElementById('takvim-modal').style.display='none'">✕</button>
    </div>
    <div class="modal-body" id="takvim-modal-body"></div>
  </div>
</div>

<!-- RANDEVU FORM MODAL -->
<div class="modal-overlay" id="randevu-modal" style="display:none" onclick="closeRandevuModal(event)">
  <div class="modal" style="max-width:540px">
    <div class="modal-header">
      <h2 id="randevu-modal-title">Yeni Randevu</h2>
      <button class="modal-close" onclick="document.getElementById('randevu-modal').style.display='none'">✕</button>
    </div>
    <div class="modal-body" id="randevu-modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const DRIVE_CLIENT_ID = '760070734433-ho3s6vo856qf06gtfpo5d7tou5npk33l.apps.googleusercontent.com';
const DRIVE_FOLDER_NAME = 'RheumAdmit_Hastalar';
const DRIVE_FOLDER_ID = '1WwjCPb3GIsPmgoFWiqnuA1R6BZlp-zPS'; // Sabit klasör ID
let driveAccessToken = null;
let driveFolderId = null;
let driveTokenExpiry = 0;
let lastHastaSync = null; // En son görülen hasta dosyasının Drive modifiedTime'ı
let lastSyncTime = null;

// ── DRIVE AUTH ──
function initDrive() {
  window.tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: DRIVE_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/drive',
    prompt: 'select_account',
    callback: async (resp) => {
      if (resp.error) {
        if (resp.error === 'interaction_required' || resp.error === 'access_denied') {
          // Otomatik yenilemede login ekranı açma — sadece sayaçta uyar
          driveAccessToken = null;
          const el = document.getElementById('sync-countdown');
          if (el) {
            el.textContent = '☁ Yeniden bağlan';
            el.style.cursor = 'pointer';
            el.style.color = 'var(--warn)';
            el.onclick = () => {
              localStorage.removeItem('rheum_account');
              window.tokenClient.requestAccessToken({prompt: 'select_account'});
            };
          }
          return;
        }
        showToast('Drive bağlantı hatası: ' + resp.error, 'error');
        return;
      }
      driveAccessToken = resp.access_token;
      // Hesabı hatırla
      try { localStorage.setItem('rheum_account', resp.access_token ? '1' : ''); } catch(e) {}
      // Token 55 dakika sonra otomatik yenile — hesap sormadan
      setTimeout(() => window.tokenClient.requestAccessToken({prompt: ''}), 55 * 60 * 1000);
      // Her 10 dakikada Drive sync (öncesi otomatik kayıt yapar)
      let syncCountdown = 10 * 60; // saniye
      function updateCountdown() {
        syncCountdown--;
        if (syncCountdown <= 0) {
          syncCountdown = 10 * 60;
          if (driveAccessToken) syncFromDrive();
        }
        const m = String(Math.floor(syncCountdown / 60)).padStart(2, '0');
        const s = String(syncCountdown % 60).padStart(2, '0');
        const el = document.getElementById('sync-countdown');
        if (el) el.textContent = '☁ ' + m + ':' + s;
      }
      setInterval(updateCountdown, 1000); // sessiz yenileme
      driveFolderId = DRIVE_FOLDER_ID;
      await syncFromDrive();
    }
  });
  // Daha önce giriş yapıldıysa sessiz, ilk kez ise hesap seçtir
  const hadAccount = localStorage.getItem('rheum_account');
  window.window.tokenClient.requestAccessToken({prompt: hadAccount ? '' : 'select_account'});
}

async function getOrCreateFolder() {
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
    { headers: { Authorization: 'Bearer ' + driveAccessToken } }
  );
  const data = await res.json();
  if (data.files && data.files.length > 0) return data.files[0].id;
  const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + driveAccessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: DRIVE_FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' })
  });
  const folder = await createRes.json();
  return folder.id;
}

async function syncFromDrive() {
  if (!driveAccessToken) { initDrive(); return; }
  const btn = document.getElementById('drive-sync-btn');
  if (btn) { btn.textContent = '⏳ Senkronize...'; btn.disabled = true; }
  try {
    if (!driveFolderId) driveFolderId = DRIVE_FOLDER_ID;

    // Sync öncesi mevcut durumu otomatik kaydet (hastalar varsa)
    // Sadece Drive'a + localStorage — bilgisayara indirme yok
    if (hastalar.length > 0) {
      const state = {
        hastalar, pinnedIds: Array.from(pinnedIds), patientNotes,
        manualOrder, manualMoved: Array.from(manualMoved),
        blacklist: Array.from(blacklist), randevular,
        lastHastaSync: lastHastaSync || null,
        savedAt: new Date().toISOString()
      };
      try { localStorage.setItem('rheum_durum', JSON.stringify(state)); } catch(e) {}
      await saveDurumSilent(JSON.stringify(state, null, 2),
        'rheum_durum_' + new Date().toISOString().slice(0,10) + '.json');
    }

    // Tüm Drive dosyalarını listele (tarihe göre sıralı)
    // Tüm sayfaları çek (pagination)
    let files = [];
    let pageToken = null;
    do {
      const url = `https://www.googleapis.com/drive/v3/files?q='${driveFolderId}' in parents and mimeType='application/json' and trashed=false&fields=nextPageToken,files(id,name,modifiedTime)&orderBy=modifiedTime desc&pageSize=1000`
        + (pageToken ? `&pageToken=${pageToken}` : '');
      const res = await fetch(url, { headers: { Authorization: 'Bearer ' + driveAccessToken } });
      if (res.status === 401) {
        driveAccessToken = null;
        showToast('⚠ Drive oturumu sona erdi, yeniden bağlanılıyor...', 'error');
        initDrive();
        return;
      }
      const data = await res.json();
      files = files.concat(data.files || []);
      pageToken = data.nextPageToken || null;
    } while (pageToken);

    // 1. En son durum dosyasını bul ve yükle
    const durumFiles = files.filter(f => f.name.startsWith('rheum_durum_'));
    if (durumFiles.length > 0) {
      const durumRes = await fetch(
        `https://www.googleapis.com/drive/v3/files/${durumFiles[0].id}?alt=media`,
        { headers: { Authorization: 'Bearer ' + driveAccessToken } }
      );
      const durumData = await durumRes.json();
      hastalar = durumData.hastalar || [];
      pinnedIds = new Set(durumData.pinnedIds || []);
      patientNotes = durumData.patientNotes || {};
      manualOrder = durumData.manualOrder || {};
      manualMoved = new Set(durumData.manualMoved || []);
      blacklist = new Set(durumData.blacklist || []);
      randevular = durumData.randevular || [];
      lastHastaSync = durumData.lastHastaSync || null;
    }

    // 2. lastHastaSync'ten sonra yüklenen hasta dosyalarını bul
    // İlk açılışta (lastHastaSync=null) tüm hastalar taranır
    const hastaTimeFilter = lastHastaSync ? ` and modifiedTime > '${lastHastaSync}'` : '';
    const hastaQuery = `https://www.googleapis.com/drive/v3/files?q='${driveFolderId}' in parents and name contains 'hasta_' and mimeType='application/json' and trashed=false${hastaTimeFilter}&fields=files(id,name,modifiedTime)&orderBy=modifiedTime asc&pageSize=1000`;
    const hastaRes = await fetch(hastaQuery, { headers: { Authorization: 'Bearer ' + driveAccessToken } });
    const hastaListData = await hastaRes.json();
    const hastaFiles = hastaListData.files || [];
    let newCount = 0;
    for (const file of hastaFiles) {
      const contentRes = await fetch(
        `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`,
        { headers: { Authorization: 'Bearer ' + driveAccessToken } }
      );
      const patientData = await contentRes.json();
      if (!patientData.hastaAdi) continue;
      const id = patientData.tcKimlik + '_' + patientData.listeTarihi;
      if (blacklist.has(id)) continue;
      if (!hastalar.find(h => h.id === id)) {
        hastalar.push({...patientData, id});
        newCount++;
      }
      // En yeni hasta dosyasının tarihini güncelle
      if (!lastHastaSync || file.modifiedTime > lastHastaSync) {
        lastHastaSync = file.modifiedTime;
      }
    }

    // localStorage'a yedekle
    try {
      const state = {hastalar, pinnedIds: Array.from(pinnedIds), patientNotes,
        manualOrder, manualMoved: Array.from(manualMoved), blacklist: Array.from(blacklist),
        randevular, savedAt: new Date().toISOString()};
      localStorage.setItem('rheum_durum', JSON.stringify(state));
    } catch(e) {}

    render();
    renderRandevu();
    lastSyncTime = new Date();

    if (newCount > 0) {
      showToast('🆕 ' + newCount + ' yeni hasta eklendi!', 'success', 5000);
    } else if (durumFiles.length > 0) {
      showToast('✅ Son durum yüklendi', 'success');
    } else {
      showToast('✅ Drive senkronize', 'success');
    }
  } catch(e) {
    showToast('❌ Drive sync hatası: ' + e.message, 'error');
  } finally {
    if (btn) { btn.textContent = '☁ Drive Sync'; btn.disabled = false; }
  }
}

// ── STATE ──
let hastalar = []; // all loaded patients
let pinnedIds = new Set();
let patientNotes = {}; // {id: note}
let manualOrder = {}; // {col: [id, id, ...]} user reordered
let manualMoved = new Set(); // elle taşınmış hastalar — pozisyonları korunur
let blacklist = new Set(); // silinmiş hastalar — sync'te gelmez
let filters = { gender: 'all', score: 'all', days: 'all' };
let sortMode = 'default'; // default | score | days


// ── LOAD JSON — tek listener aşağıda ──

// ── DAYS SINCE ──
function daysSince(dateStr) {
  if (!dateStr) return 0;
  const d = new Date(dateStr);
  const now = new Date();
  return Math.floor((now - d) / 86400000);
}

function isPending(h) {
  // Sadece planlananTarih varsa ve gelecekteyse pending
  if (!h.planlananTarih) return false;
  return daysSince(h.planlananTarih) < 0;
}

function effectiveDays(h) {
  return daysSince(h.listeTarihi);
}

// ── HAS A ──
function hasA(h) {
  return !!(h.yasamRisk && h.yasamRisk.trim());
}

function isDoctorYakini(h) {
  return !!(h.frailty && h.frailty.includes('Doktor yakını'));
}

function isDevir(h) {
  return h.yatisAmaci === 'H-Devir';
}

// ── SORT ──
function sortTani(list) {
  return list.slice().sort((a, b) => {
    // 0. İleri tarihli (bekleyen) her zaman en alta
    const aPend = isPending(a);
    const bPend = isPending(b);
    if (aPend !== bPend) return aPend ? 1 : -1;

    // 1. A işaretliler → Devir hastaları → Diğerleri
    const aA = hasA(a), bA = hasA(b);
    const aDevir = isDevir(a), bDevir = isDevir(b);

    // A → A+Devir → Devir → Diğer
    const tierA = (aA && !aDevir) ? 0 : (aA && aDevir) ? 1 : aDevir ? 2 : 3;
    const tierB = (bA && !bDevir) ? 0 : (bA && bDevir) ? 1 : bDevir ? 2 : 3;
    if (tierA !== tierB) return tierA - tierB;

    // Aynı grup içinde: puan+gün toplamına göre
    const aTotal = (parseInt(a.toplamPuan)||0) + daysSince(a.listeTarihi);
    const bTotal = (parseInt(b.toplamPuan)||0) + daysSince(b.listeTarihi);
    return bTotal - aTotal;
  });
}

function sortByDate(list) {
  return list.slice().sort((a, b) => {
    // İleri tarihli her zaman en alta
    const aPend = isPending(a), bPend = isPending(b);
    if (aPend !== bPend) return aPend ? 1 : -1;
    return daysSince(b.listeTarihi) - daysSince(a.listeTarihi);
  });
}

// ── FILTER ──
function applyFilters(list) {
  return list.filter(h => {
    if (filters.gender !== 'all' && h.cinsiyet !== filters.gender) return false;
    return true;
  });
}

// ── RENDER ──
function render() {
  const cols = {
    'tani': ['Tanı/Tedavi','H-Devir'],
    'egitim': ['İlaç Eğitimi'],
    'uygulama': ['İlaç Uygulaması']
  };

  Object.entries(cols).forEach(([colKey, amaclar]) => {
    const body = document.getElementById('body-' + colKey);
    const cnt = document.getElementById('cnt-' + colKey);
    let list = hastalar.filter(h => amaclar.includes(h.yatisAmaci));

    if (manualOrder[colKey] && manualOrder[colKey].length > 0) {
      // Sadece kilitli (📌 veya 🔒) hastaların pozisyonları korunur
      // Diğerleri her zaman otomatik sıralanır
      // Yeni hastalar da otomatik sıralamaya girer

      // 1. Tüm hastaları otomatik sırala
      const allAutoSorted = colKey === 'tani' ? sortTani(list) : sortByDate(list);

      // 2. Kilitli hastaların pozisyonlarını al
      const lockedPositions = {}; // { absoluteIndex: hasta }
      manualOrder[colKey].forEach((id, idx) => {
        if (!pinnedIds.has(id) && !manualMoved.has(id)) return;
        const h = list.find(h => h.id === id);
        if (h) lockedPositions[idx] = h;
      });

      // 3. Serbest hastaları otomatik sırala (kilitliler hariç)
      const freeAutoSorted = allAutoSorted.filter(h =>
        !pinnedIds.has(h.id) && !manualMoved.has(h.id)
      );

      // 4. Final listeyi oluştur
      const totalCount = allAutoSorted.length;
      const result = new Array(totalCount).fill(null);

      // Kilitlileri mutlak pozisyonlarına yerleştir
      Object.entries(lockedPositions).forEach(([idx, h]) => {
        const pos = parseInt(idx);
        if (pos < totalCount) result[pos] = h;
        else result.push(h);
      });

      // Boş slotlara serbest hastaları otomatik sırayla yerleştir
      let fi = 0;
      for (let i = 0; i < result.length; i++) {
        if (result[i] === null && fi < freeAutoSorted.length) {
          result[i] = freeAutoSorted[fi++];
        }
      }
      while (fi < freeAutoSorted.length) result.push(freeAutoSorted[fi++]);

      list = result.filter(Boolean);
    } else {
      list = colKey === 'tani' ? sortTani(list) : sortByDate(list);
    }

    let filtered = applyFilters(list);
    // Apply sort mode
    if (sortMode === 'score') {
      filtered = filtered.slice().sort((a,b) => (parseInt(b.toplamPuan)||0) - (parseInt(a.toplamPuan)||0));
    } else if (sortMode === 'days') {
      filtered = filtered.slice().sort((a,b) => effectiveDays(b) - effectiveDays(a));
    }
    cnt.textContent = filtered.length;
    body.innerHTML = '';

    filtered.forEach(h => {
      const pending = h.planlananTarih && daysSince(h.planlananTarih) < 0;
      const days = pending ? 0 : daysSince(h.listeTarihi);
      const daysUntil = pending ? Math.abs(daysSince(h.planlananTarih)) : 0;
      const score = parseInt(h.toplamPuan) || 0;
      const aFlag = hasA(h);
      const devirFlag = isDevir(h);
      const genderClass = h.cinsiyet === 'Erkek' ? 'male' : h.cinsiyet === 'Kadın' ? 'female' : '';
      const cardClass = devirFlag ? 'devir' : genderClass;
      const isPinned = pinnedIds.has(h.id);
      const myNote = patientNotes[h.id] || '';

      const card = document.createElement('div');
      const isLocked = manualMoved.has(h.id);
      card.className = `card ${cardClass} ${isPinned ? 'pinned' : ''} ${isLocked && !isPinned ? 'locked' : ''}`;
      card.dataset.id = h.id;
      card.draggable = false;

      const total = score + days;
      let metaHtml = '';
      if (colKey === 'tani') {
        metaHtml = `<span class="card-score ${aFlag || score >= 15 ? 'high' : ''}" title="Puan+Gün: ${total}">${score}p</span>`;
      }
      metaHtml += `<span class="card-days">${days} gün</span>`;
      if (colKey === 'tani') metaHtml += `<span style="font-size:0.7rem;color:var(--text2);font-family:'Courier New',monospace" title="Puan + Gün toplamı">Σ${total}</span>`;
      metaHtml += `<span class="card-gender ${genderClass}">${h.cinsiyet || ''}</span>`;

      if (pending) {
        card.style.opacity = '0.45';
        card.style.filter = 'grayscale(40%)';
        card.title = `Planlanan tarih: ${h.planlananTarih} (${daysUntil} gün sonra)`;
      }

      const devirBadge = devirFlag ? '<span class="badge-devir">Devir Hastası' + (h.devirServisi ? ' · '+h.devirServisi : '') + '</span>' : '';
      const doktorBadge = isDoctorYakini(h) ? '<span class="badge-doktor">D</span>' : '';
      const pendingBadge = pending ? '<span style="font-size:0.65rem;background:rgba(136,146,176,.2);color:#8892b0;border:1px solid #2a3050;border-radius:4px;padding:1px 5px;margin-left:auto">📅 '+daysUntil+'g sonra</span>' : '';
      const noteBadge = myNote ? '<div class="card-note">📝 ' + myNote + '</div>' : '';

      card.innerHTML = `
        <div class="card-inner">
          <div class="card-body">
            <div class="card-name">
              ${h.hastaAdi}
              ${aFlag ? '<span class="badge-a">A</span>' : ''}
              ${devirBadge}
              ${doktorBadge}
              ${pendingBadge}
            </div>
            <div class="card-meta">${metaHtml}</div>
            ${noteBadge}
          </div>
          <div class="arrow-wrap">
            <span class="arrow-name">${h.hastaAdi}</span>
            <button class="arrow-btn" title="Yukarı" onclick="moveCard('${h.id}','${colKey}',-1,event)">▲</button>
            <button class="arrow-btn" title="Aşağı" onclick="moveCard('${h.id}','${colKey}',1,event)">▼</button>
          </div>
        </div>`;

      card.addEventListener('click', (e) => { if(!e.target.classList.contains('arrow-btn')) openModal(h); });

      body.appendChild(card);
    });
  });
}

// ── OK İLE SIRALAMA ──
function moveCard(id, colKey, dir, e) {
  e.stopPropagation();

  // Mevcut görsel sırayı al
  const body = document.getElementById('body-' + colKey);
  const cards = Array.from(body.querySelectorAll('.card'));
  const currentOrder = cards.map(c => c.dataset.id);

  const idx = currentOrder.indexOf(id);
  if (idx === -1) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= currentOrder.length) return;

  // Swap
  [currentOrder[idx], currentOrder[newIdx]] = [currentOrder[newIdx], currentOrder[idx]];
  manualOrder[colKey] = currentOrder;
  // Elle taşınan hasta pozisyon korumasına alınır
  manualMoved.add(id);
  render();
}

// ── MODAL ──
function openModal(h) {
  const days = daysSince(h.listeTarihi);
  const score = parseInt(h.toplamPuan) || 0;

  document.getElementById('modal-title').textContent = h.hastaAdi;

  const fields = [
    ['TC Kimlik', h.tcKimlik],
    ['Yaş / Cinsiyet', `${h.hastaYasi} / ${h.cinsiyet || '-'}`],
    ['Romatolojik Tanı', h.romatoTani],
    ['Kullandığı İlaçlar', h.kullandigiIlaclar],
    ['Telefon', h.telefon],
    ['Yanındaki', h.yanindaki],
    ['Kayıt Tarihi', h.listeTarihi + ` (${days} gün)`],
    ['Planlanan Tarih', h.planlananTarih ? h.planlananTarih + (isPending(h) ? ` (${Math.abs(daysSince(h.planlananTarih))} gün sonra)` : ' (aktif)') : ''],
    ['Doktor', h.doktor],
    ['Yatış Amacı', h.yatisAmaci],
    ['Devir Servisi', h.devirServisi],
  ];

  let html = '';

  if (score > 0) {
    html += `<div class="score-badge">TOPLAM PUAN: ${score}</div>`;
  }

  fields.forEach(([l, v]) => {
    if (v && v.trim && v.trim()) {
      html += `<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-value">${v}</span></div>`;
    }
  });

  const scoring = [
    ['A - Yaşamsal Risk', h.yasamRisk],
    ['B - Organ Tutulumu', h.organTutulumu],
    ['C - Aktivite', h.hastalikAktivitesi],
    ['D1 - Tedavi', h.tedaviIhtiyaci],
    ['D2 - Etyoloji', h.etyoloji],
    ['D3 - Tarama', h.tarama],
    ['E - Komorbidite', h.komorbidite],
    ['F - Yaş Grubu', h.yasGrubu],
    ['G - Frailty', h.frailty],
  ];

  const hasScoring = scoring.some(([, v]) => v && v.trim());
  if (hasScoring) {
    html += '<hr class="detail-divider">';
    scoring.forEach(([l, v]) => {
      if (v && v.trim()) {
        html += `<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-value">${v}</span></div>`;
      }
    });
  }

  if (h.kisaHikaye) {
    html += '<hr class="detail-divider">';
    html += `<div class="detail-row"><span class="detail-label">Kısa Hikaye</span><span class="detail-value" style="white-space:pre-wrap">${h.kisaHikaye}</span></div>`;
  }

  if (h.notlar) {
    html += '<hr class="detail-divider">';
    html += `<div class="detail-row"><span class="detail-label">Notlar/Tedavi Planı</span><span class="detail-value" style="white-space:pre-wrap">${h.notlar}</span></div>`;
  }

  html += '<hr class="detail-divider">';
  html += `<div style="font-size:0.8rem;color:var(--text2);margin-bottom:6px">📝 Kişisel Notum</div>`;
  html += `<textarea class="note-area" id="modal-note" placeholder="Bu hasta için not ekle...">${patientNotes[h.id] || ''}</textarea>`;

  const isLocked = manualMoved.has(h.id);
  const isPinnedNow = pinnedIds.has(h.id);
  const hastaRandevular = randevular.filter(r => r.hastaId === h.id);
  html += `<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
    <button class="btn btn-primary" onclick="saveNote('${h.id}')">Notu Kaydet</button>
    <button class="btn btn-secondary" style="color:var(--accent2);border-color:var(--accent2)" onclick="closeModalDirect();openHastaRandevular('${h.id}')">📅 Randevu/Taburcu ${hastaRandevular.length > 0 ? '('+hastaRandevular.length+')' : ''}</button>
    <button class="btn ${isPinnedNow ? 'btn-warn' : 'btn-secondary'}" onclick="togglePin('${h.id}')">${isPinnedNow ? '📌 Sabitlemeyi Kaldır' : '📌 Sabitle'}</button>
    ${isLocked ? `<button class="btn btn-secondary" style="color:#4ff79e;border-color:#4ff79e" onclick="unlockPosition('${h.id}')">🔒 Konumu Serbest Bırak</button>` : ''}
    <button class="btn btn-secondary" style="color:var(--danger);border-color:var(--danger)" onclick="removePatient('${h.id}')">🗑 Listeden Çıkar</button>
  </div>`;

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal').style.display = 'none';
}

function saveNote(id) {
  patientNotes[id] = document.getElementById('modal-note').value;
  closeModalDirect();
  render();
  showToast('✅ Not kaydedildi', 'success');
}

function togglePin(id) {
  if (pinnedIds.has(id)) {
    // Sabitleme kalkıyor
    pinnedIds.delete(id);
    // Eğer 🔒 (manualMoved) da yoksa → manualOrder'dan çıkar, otomatik sıraya gitsin
    if (!manualMoved.has(id)) {
      ['tani','egitim','uygulama'].forEach(colKey => {
        if (manualOrder[colKey]) {
          manualOrder[colKey] = manualOrder[colKey].filter(i => i !== id);
          if (manualOrder[colKey].length === 0) delete manualOrder[colKey];
        }
      });
    }
    // 🔒 varsa → pozisyon korunmaya devam eder, manualOrder'a dokunma
  } else {
    // Sabitleniyor:
    // Mevcut görsel sırayı yakala — hasta hangi pozisyondaysa orada sabitlenir
    ['tani','egitim','uygulama'].forEach(colKey => {
      const body = document.getElementById('body-' + colKey);
      if (body) {
        const cards = Array.from(body.querySelectorAll('.card'));
        if (cards.length > 0) {
          manualOrder[colKey] = cards.map(c => c.dataset.id);
        }
      }
    });
    pinnedIds.add(id);
  }
  closeModalDirect();
  render();
}

function unlockPosition(id) {
  manualMoved.delete(id);
  // Sabitlenmiş değilse manualOrder'dan da çıkar → otomatik yerine gitsin
  // Sabitlenmiş ise manualOrder'da kalsın → 📌 pozisyonu korumaya devam eder
  if (!pinnedIds.has(id)) {
    ['tani','egitim','uygulama'].forEach(colKey => {
      if (manualOrder[colKey]) {
        manualOrder[colKey] = manualOrder[colKey].filter(i => i !== id);
        if (manualOrder[colKey].length === 0) delete manualOrder[colKey];
      }
    });
  }
  closeModalDirect();
  render();
  showToast('🔓 Konum serbest bırakıldı', 'success');
}

function removePatient(id) {
  if (!confirm('Bu hastayı listeden çıkarmak istiyor musunuz?')) return;
  hastalar = hastalar.filter(h => h.id !== id);
  manualMoved.delete(id);
  blacklist.add(id);
  ['tani','egitim','uygulama'].forEach(col => {
    if (manualOrder[col]) manualOrder[col] = manualOrder[col].filter(i => i !== id);
  });
  // localStorage'a kaydet ki yeniden açılınca da hatırlasın
  try {
    const bl = JSON.parse(localStorage.getItem('rheum_blacklist') || '[]');
    bl.push(id);
    localStorage.setItem('rheum_blacklist', JSON.stringify(bl));
  } catch(e) {}
  closeModalDirect();
  render();
}

// ── FILTERS & SORT ──
function setFilter(type, val, btn) {
  filters[type] = val;
  btn.closest('.filters').querySelectorAll('.filter-btn').forEach(b => {
    if (b.onclick && b.onclick.toString().includes(`'${type}'`)) b.classList.remove('active');
  });
  btn.classList.add('active');
  render();
  renderRandevu();
}

function setSort(mode, btn) {
  sortMode = mode;
  document.querySelectorAll('#sort-default,#sort-score,#sort-days').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── SAVE STATE ──
function saveState() {
  // Kaydetmeden önce ekrandaki tam görsel sırayı yakala.
  // Bu sayede 3 gün sonra açınca sabitlenmiş hastalar yerinde kalır,
  // sadece gün sayıları ve otomatik sıralama (sabitsizler için) güncellenir.
  ['tani','egitim','uygulama'].forEach(colKey => {
    const body = document.getElementById('body-' + colKey);
    if (body) {
      const cards = Array.from(body.querySelectorAll('.card'));
      if (cards.length > 0) {
        manualOrder[colKey] = cards.map(c => c.dataset.id);
      }
    }
  });

  const state = {
    hastalar,
    pinnedIds: Array.from(pinnedIds),
    patientNotes,
    manualOrder,
    manualMoved: Array.from(manualMoved),
    blacklist: Array.from(blacklist),
    randevular,
    savedAt: new Date().toISOString()
  };
  // localStorage'a kaydet (otomatik yükleme için)
  try {
    localStorage.setItem('rheum_durum', JSON.stringify(state));
  } catch(e) {
    console.warn('localStorage kayıt hatası:', e);
  }

  const jsonStr = JSON.stringify(state, null, 2);
  const fileName = 'rheum_durum_' + new Date().toISOString().slice(0,10) + '.json';

  // Lokal indir
  const blob = new Blob([jsonStr], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fileName;
  a.click();

  // Drive'a yükle
  if (driveAccessToken) {
    saveDurum(jsonStr, fileName);
  } else {
    showToast('✅ Durum kaydedildi (Drive bağlı değil)', 'success');
  }
}

// Sessiz kayıt — sadece Drive'a, bilgisayara indirme yok
async function temizleskiDurum() {
  // 90 günden eski rheum_durum_ dosyalarını sil
  try {
    const sinir = new Date();
    sinir.setDate(sinir.getDate() - 90);
    const sinirStr = sinir.toISOString();
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q='${driveFolderId}' in parents and name contains 'rheum_durum_' and mimeType='application/json' and trashed=false and modifiedTime < '${sinirStr}'&fields=files(id,name)&pageSize=100`,
      { headers: { Authorization: 'Bearer ' + driveAccessToken } }
    );
    const data = await res.json();
    for (const f of (data.files || [])) {
      await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}`, {
        method: 'DELETE',
        headers: { Authorization: 'Bearer ' + driveAccessToken }
      });
      console.log('Silindi:', f.name);
    }
  } catch(e) { console.warn('Temizlik hatası:', e); }
}

async function saveDurumSilent(jsonStr, fileName) {
  if (!driveAccessToken) return;
  try {
    if (!driveFolderId) driveFolderId = DRIVE_FOLDER_ID;
    const searchRes = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${fileName}' and '${driveFolderId}' in parents and trashed=false&fields=files(id)`,
      { headers: { Authorization: 'Bearer ' + driveAccessToken } }
    );
    const searchData = await searchRes.json();
    const form = new FormData();
    if (searchData.files && searchData.files.length > 0) {
      const fileId = searchData.files[0].id;
      form.append('metadata', new Blob([JSON.stringify({name: fileName})], {type:'application/json'}));
      form.append('file', new Blob([jsonStr], {type:'application/json'}));
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`, {
        method: 'PATCH', headers: { Authorization: 'Bearer ' + driveAccessToken }, body: form
      });
    } else {
      form.append('metadata', new Blob([JSON.stringify({name: fileName, parents: [driveFolderId]})], {type:'application/json'}));
      form.append('file', new Blob([jsonStr], {type:'application/json'}));
      await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST', headers: { Authorization: 'Bearer ' + driveAccessToken }, body: form
      });
    }
    // Arka planda eski dosyaları temizle (90 gün+)
    temizleskiDurum();
  } catch(e) { console.warn('Sessiz kayıt hatası:', e); }
}

async function deleteOldDurumFiles(keepFileId) {
  // Bugünkü (keepFileId) hariç eski durum dosyalarını sil
  try {
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q='${driveFolderId}' in parents and name contains 'rheum_durum_' and mimeType='application/json' and trashed=false&fields=files(id,name,modifiedTime)&pageSize=100`,
      { headers: { Authorization: 'Bearer ' + driveAccessToken } }
    );
    const data = await res.json();
    const doksan_gun_once = new Date(Date.now() - 90 * 24 * 60 * 60 * 1000).toISOString();
    const eskiler = (data.files || []).filter(f => f.id !== keepFileId && f.modifiedTime < doksan_gun_once);
    for (const f of eskiler) {
      await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}`, {
        method: 'DELETE',
        headers: { Authorization: 'Bearer ' + driveAccessToken }
      });
    }
    if (eskiler.length > 0) console.log('Silinen eski durum dosyaları:', eskiler.length);
  } catch(e) { console.warn('Eski dosya silme hatası:', e); }
}

async function saveDurum(jsonStr, fileName) {
  try {
    if (!driveFolderId) driveFolderId = DRIVE_FOLDER_ID;

    // Aynı isimde dosya varsa güncelle, yoksa yeni oluştur
    const searchRes = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${fileName}' and '${driveFolderId}' in parents and trashed=false&fields=files(id)`,
      { headers: { Authorization: 'Bearer ' + driveAccessToken } }
    );
    const searchData = await searchRes.json();

    let res;
    if (searchData.files && searchData.files.length > 0) {
      // Güncelle
      const fileId = searchData.files[0].id;
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({name: fileName})], {type:'application/json'}));
      form.append('file', new Blob([jsonStr], {type:'application/json'}));
      res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`, {
        method: 'PATCH',
        headers: { Authorization: 'Bearer ' + driveAccessToken },
        body: form
      });
    } else {
      // Yeni oluştur
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({name: fileName, parents: [driveFolderId]})], {type:'application/json'}));
      form.append('file', new Blob([jsonStr], {type:'application/json'}));
      res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + driveAccessToken },
        body: form
      });
    }

    if (res.ok) {
      const saved = await res.json();
      showToast("✅ Durum Drive'a kaydedildi", 'success');
      // Eski durum dosyalarını temizle
      deleteOldDurumFiles(saved.id);
    } else {
      showToast('⚠ Drive hatası — sadece lokal kaydedildi', 'error');
    }
  } catch(e) {
    showToast('⚠ Drive hatası: ' + e.message, 'error');
  }
}

// ── TEK JSON LISTENER ──
document.getElementById('json-input').addEventListener('change', e => {
  const files = Array.from(e.target.files);
  let totalLoaded = 0;
  let remaining = files.length;

  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);

        if (data.savedAt && data.hastalar) {
          // Durum dosyası
          hastalar = data.hastalar || [];
          pinnedIds = new Set(data.pinnedIds || []);
          patientNotes = data.patientNotes || {};
          manualOrder = data.manualOrder || {};
          manualMoved = new Set(data.manualMoved || []);
          blacklist = new Set(data.blacklist || []);
          randevular = data.randevular || [];
          remaining--;
          if (remaining === 0) {
            render();
            renderRandevu();
            showToast('✅ Durum yüklendi: ' + hastalar.length + ' hasta', 'success');
          }
        } else {
          // Hasta JSON dosyası (tekil veya dizi)
          const items = Array.isArray(data) ? data : [data];
          items.forEach(d => {
            if (!d.hastaAdi) return;
            const id = d.tcKimlik + '_' + d.listeTarihi;
            if (!hastalar.find(h => h.id === id)) {
              hastalar.push({...d, id});
              totalLoaded++;
            }
          });
          remaining--;
          if (remaining === 0) {
            render();
            if (totalLoaded > 0) showToast('✅ ' + totalLoaded + ' hasta eklendi', 'success');
            else showToast('⚠ Yeni hasta bulunamadı (zaten listede)', 'error');
          }
        }
      } catch(err) {
        showToast('❌ Dosya okunamadı: ' + file.name, 'error');
        remaining--;
      }
    };
    reader.readAsText(file);
  });
  e.target.value = '';
});

  const aktifler = hastalar.filter(h => !blacklist.has(h.id));
  const ws1 = XLSX.utils.aoa_to_sheet([H1, ...aktifler.map(h => [...K1.map(k => h[k]||''), patientNotes[h.id]||''])]);

  // ── SHEET 2: TABURCU / RANDEVU ──
  const H2 = ['Hasta Adı','TC','Yaş','Cinsiyet','Telefon','Randevu Tarihi','Neden','İlaç Adı','Doz','Kür','Rapor','Form','Plan/Not','Yattı'];
  const ws2 = XLSX.utils.aoa_to_sheet([H2, ...randevular.map(r => [
    r.hastaAdi||'', r.tcKimlik||'', r.hastaYasi||'', r.cinsiyet||'', r.telefon||'',
    r.tarih||'', r.neden||'', r.ilacAdi||'', r.doz||'', r.kur||'',
    r.rapor ? 'Var' : 'Yok', r.form ? 'Var' : 'Yok',
    r.plan||r.not||'', r.yatti ? 'Evet' : 'Hayır'
  ])]);
  ws2['!cols'] = H2.map(() => ({wch: 16}));
  XLSX.utils.book_append_sheet(wb, ws2, 'Taburcu-Randevu');

  // ── SHEET 3: SİLİNEN / YATAN ──
  const H3 = ['Hasta Adı','TC','Yaş','Cinsiyet','Kayıt Tarihi','Yatış Amacı','Toplam Puan','Durum'];
  const silinenler = hastalar.filter(h => blacklist.has(h.id));
  const yatanlar = randevular.filter(r => r.yatti);
  const rows3 = [
    ...silinenler.map(h => [h.hastaAdi||'', h.tcKimlik||'', h.hastaYasi||'', h.cinsiyet||'', h.listeTarihi||'', h.yatisAmaci||'', h.toplamPuan||'', 'Listeden Silindi']),
    ...yatanlar.map(r => [r.hastaAdi||'', r.tcKimlik||'', r.hastaYasi||'', r.cinsiyet||'', r.tarih||'', r.neden||'', '', 'Yattı'])
  ];

  ws3['!cols'] = H3.map(() => ({wch: 18}));
  XLSX.utils.book_append_sheet(wb, ws3, 'Silinen-Yatan');

  if (aktifler.length + randevular.length + rows3.length === 0) {
    showToast('Kayıt yok!', 'error'); return;
  }

  XLSX.writeFile(wb, 'rheum_admit_' + new Date().toISOString().slice(0,10) + '.xlsx');
  showToast('✅ Excel indirildi (3 sayfa)', 'success');
}

// ── RANDEVU STATE ──
let randevular = [];

// Tarih yardımcıları — saat dilimi kayması olmadan
function parseDate(tarihStr) {
  if (!tarihStr) return new Date();
  const [y, m, d] = tarihStr.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function formatDate(tarihStr) {
  if (!tarihStr) return '';
  return parseDate(tarihStr).toLocaleDateString('tr-TR');
}

// Yerel tarihi YYYY-MM-DD formatında döndür (UTC kayması yok)
function localDateStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + d;
}

// ── TAKVİM AÇ ──
let takvimHaftaOffset = 0; // kaç hafta ileri

// Hasta modalından açılan randevu listesi
function openHastaRandevular(hastaId) {
  const h = hastalar.find(h => h.id === hastaId);

function openTakvim(hastaId) {
  secilenTarih = null;
  takvimHaftaOffset = 0;
  renderTakvim(hastaId);
  document.getElementById('takvim-modal').style.display = 'flex';
}

function renderTakvim(hastaId) {
  const body = document.getElementById('takvim-modal-body');
  const bugun = new Date();
  bugun.setHours(0,0,0,0);

  // Haftanın başı (Pazartesi)
  const haftaBasi = new Date(bugun);
  haftaBasi.setDate(bugun.getDate() - bugun.getDay() + 1 + takvimHaftaOffset * 7);
  const haftaSonu = new Date(haftaBasi);
  haftaSonu.setDate(haftaBasi.getDate() + 6);

  const gunler = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
  const gunlerTam = ['Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi','Pazar'];

  let html = '';

  // Hafta başlığı + oklar
  const hId = hastaId || '';
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">';
  html += '<button class="btn btn-secondary" onclick="takvimHaftaDegistir(-1,\'' + hId + '\')">◀</button>';
  html += '<div style="flex:1;text-align:center;font-size:0.85rem;color:var(--text2)">';
  html += haftaBasi.toLocaleDateString('tr-TR') + ' — ' + haftaSonu.toLocaleDateString('tr-TR');
  html += '</div>';
  html += '<button class="btn btn-secondary" onclick="takvimHaftaDegistir(1,\'' + hId + '\')">▶</button>';
  html += '</div>';

  // 7 günlük grid
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px">';
  for (let i = 0; i < 7; i++) {
    const gun = new Date(haftaBasi);
    gun.setDate(haftaBasi.getDate() + i);
    const gunStr = localDateStr(gun);
    const gunRandevular = randevular.filter(r => r.tarih === gunStr);
    const isBugun = gunStr === localDateStr(bugun);
    const isSecili = gunStr === secilenTarih;
    const isGecmis = gun < bugun;

    html += '<div onclick="takvimGunSec(\'' + gunStr + '\',\'' + hId + '\')" style="cursor:pointer;border-radius:8px;padding:6px 4px;text-align:center;transition:all .15s;'
      + (isSecili ? 'background:var(--accent);color:#fff;' : isBugun ? 'background:rgba(79,142,247,.2);border:1px solid var(--accent);' : 'background:var(--surface2);')
      + (isGecmis ? 'opacity:0.4;' : '')
      + '">';
    html += '<div style="font-size:0.7rem;color:'+(isSecili?'rgba(255,255,255,.7)':'var(--text2)')+'">'+gunler[i]+'</div>';
    html += '<div style="font-size:0.85rem;font-weight:600">'+gun.getDate()+'</div>';
    if (gunRandevular.length > 0) {
      html += '<div style="font-size:0.65rem;background:'+(isSecili?'rgba(255,255,255,.3)':'var(--accent)')+';color:#fff;border-radius:10px;padding:0 4px;margin-top:2px">'+gunRandevular.length+'</div>';
    }
    html += '</div>';
  }
  html += '</div>';

  // Seçili günün özeti
  html += '<div id="takvim-gun-ozet" style="font-size:0.85rem;color:var(--text2);padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:12px;min-height:36px">';
  if (secilenTarih) {
    const gr = randevular.filter(r => r.tarih === secilenTarih);
    html += gr.length === 0 ? '<span style="color:var(--success)">✅ Bu tarihte randevu yok</span>'
      : '<span style="color:var(--warn)">⚠ '+gr.length+' randevu:</span> '+gr.map(r=>r.hastaAdi).join(', ');
  } else { html += 'Tarih seçin...'; }
  html += '</div>';

  html += '<div style="display:flex;gap:8px">';
  html += '<button class="btn btn-primary" style="flex:1" id="takvim-devam-btn" onclick="takvimDevam(\'' + hId + '\')" '+(secilenTarih?'':'disabled')+'>Devam →</button>';
  html += '<button class="btn btn-secondary" onclick="document.getElementById(\"takvim-modal\").style.display=\"none\"">İptal</button>';
  html += '</div>';

  body.innerHTML = html;
}

function takvimHaftaDegistir(yon, hastaId) {
  takvimHaftaOffset += yon;
  renderTakvim(hastaId);
}

function takvimGunSec(tarih, hastaId) {
  secilenTarih = tarih;
  renderTakvim(hastaId);
}

function takvimTarihSec(tarih) {
  secilenTarih = tarih;
  updateTakvimOzet(tarih);
  const devamBtn = document.getElementById('takvim-devam-btn');
  if (devamBtn) devamBtn.disabled = false;
}

function updateTakvimOzet(tarih) {
  const ozet = document.getElementById('takvim-gun-ozet');
  if (!ozet || !tarih) return;
  const gunRandevular = randevular.filter(r => r.tarih === tarih);
  if (gunRandevular.length === 0) {
    ozet.innerHTML = '<span style="color:var(--success)">✅ Bu tarihte randevu yok</span>';
  } else {
    ozet.innerHTML = '<span style="color:var(--warn)">⚠ ' + gunRandevular.length + ' randevu var:</span> ' + gunRandevular.map(r => r.hastaAdi).join(', ');
  }
}

function takvimDevam(hastaId) {
  if (!secilenTarih) return;
  document.getElementById('takvim-modal').style.display = 'none';
  openRandevuForm(hastaId, secilenTarih);
}

        <label style="font-size:0.75rem;color:var(--text2);text-transform:uppercase">Yatış Neden ve Planı</label>
        <textarea id="r-plan" rows="3" placeholder="Yatış nedeni ve planı..." style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px;border-radius:8px;resize:vertical">${existing ? existing.plan || '' : ''}</textarea>
      </div>
    </div>

    <div class="field" style="margin-bottom:14px">
      <label style="font-size:0.75rem;color:var(--text2);text-transform:uppercase">Not (opsiyonel)</label>
      <textarea id="r-not" rows="2" placeholder="Ek not..." style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px;border-radius:8px;resize:vertical">${existing ? existing.not || '' : ''}</textarea>
    </div>

    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1" onclick="saveRandevu('${hastaId || ''}','${tarih || ''}','${existingId || ''}')">💾 Kaydet</button>
      <button class="btn btn-secondary" onclick="document.getElementById('randevu-modal').style.display='none'">İptal</button>
    </div>`;

  document.getElementById('randevu-modal').style.display = 'flex';
}

function openMiniTakvim(inputEl) {
  const wrap = document.getElementById('mini-takvim-wrap');
  if (wrap.style.display !== 'none') { wrap.style.display = 'none'; return; }

  let miniOffset = 0;
  const currentIso = inputEl.dataset.iso || new Date();

  function renderMini(offset) {
    const bugun = new Date(); bugun.setHours(0,0,0,0);
    const haftaBasi = new Date(bugun);
    haftaBasi.setDate(bugun.getDate() - bugun.getDay() + 1 + offset * 7);
    const haftaSonu = new Date(haftaBasi); haftaSonu.setDate(haftaBasi.getDate() + 6);
    const gunKisaltma = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];

    let html = '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">';
    html += '<button onclick="miniOffset--;renderMiniTakvim(miniOffset)" style="background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:3px 8px;cursor:pointer">◀</button>';
    html += '<span style="flex:1;text-align:center;font-size:0.75rem;color:var(--text2)">' + haftaBasi.toLocaleDateString('tr-TR') + ' – ' + haftaSonu.toLocaleDateString('tr-TR') + '</span>';
    html += '<button onclick="miniOffset++;renderMiniTakvim(miniOffset)" style="background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:3px 8px;cursor:pointer">▶</button>';
    html += '</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';

    for (let i = 0; i < 7; i++) {
      const gun = new Date(haftaBasi); gun.setDate(haftaBasi.getDate() + i);
      const gunStr = localDateStr(gun);
      const gunRans = randevular.filter(r => r.tarih === gunStr);
      const isSecili = gunStr === currentIso;
      const isBugun = gunStr === localDateStr(bugun);

      html += '<div data-gun="' + gunStr + '" onclick="window.secilenMiniGun=this.dataset.gun;window.applyMiniTarih()" style="cursor:pointer;border-radius:6px;padding:4px 2px;text-align:center;'
        + (isSecili ? 'background:var(--accent);color:#fff;' : isBugun ? 'border:1px solid var(--accent);' : 'background:var(--surface);')
        + '">';
      html += '<div style="font-size:0.62rem;color:' + (isSecili ? 'rgba(255,255,255,.7)' : 'var(--text2)') + '">' + gunKisaltma[i] + '</div>';
      html += '<div style="font-size:0.78rem;font-weight:600">' + gun.getDate() + '</div>';
      if (gunRans.length > 0) {
        const names = gunRans.map(r => r.hastaAdi).join(', ');
        html += '<div title="' + names + '" style="font-size:0.6rem;background:' + (isSecili ? 'rgba(255,255,255,.3)' : 'var(--warn)') + ';color:' + (isSecili ? '#fff' : '#000') + ';border-radius:8px;padding:0 3px">' + gunRans.length + '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
    wrap.innerHTML = html;

    // Expose offset to inner functions
    wrap._offset = offset;
  }

  let secilenMiniGun = currentIso;
  window.secilenMiniGun = secilenMiniGun;
  window.miniOffset = 0;

  window.renderMiniTakvim = function(off) {
    window.miniOffset = off;
    renderMini(off);
  };

  window.applyMiniTarih = function() {
    const iso = window.secilenMiniGun;
    inputEl.value = new Date(iso).toLocaleDateString('tr-TR');
    inputEl.dataset.iso = iso;
    wrap.style.display = 'none';
    // Güncel randevu sayısını göster
    const gr = randevular.filter(r => r.tarih === iso);
    if (gr.length > 0) {
      showToast('⚠ Bu tarihte ' + gr.length + ' randevu var: ' + gr.map(r=>r.hastaAdi).join(', '), 'error', 4000);
    }
  };

  renderMini(0);
  wrap.style.display = 'block';
}

function formatTarih(tarih) {
  if (!tarih) return '';
  try { return parseDate(tarih).toLocaleDateString('tr-TR'); } catch(e) { return tarih; }
}

// Randevu formu içinden takvim açma — seçince forma geri döner
let takvimFormHastaId = null;
let takvimFormExistingId = null;

function takvimFormIcin(hastaId, existingId) {
  takvimFormHastaId = hastaId;
  takvimFormExistingId = existingId;
  // Mevcut randevu modalı gizle, takvim aç
  document.getElementById('randevu-modal').style.display = 'none';
  takvimHaftaOffset = 0;
  renderTakvimFormMod(hastaId);
  document.getElementById('takvim-modal').style.display = 'flex';
}

function renderTakvimFormMod(hastaId) {
  const body = document.getElementById('takvim-modal-body');
  const bugun = new Date();
  bugun.setHours(0,0,0,0);

  const haftaBasi = new Date(bugun);
  haftaBasi.setDate(bugun.getDate() - bugun.getDay() + 1 + takvimHaftaOffset * 7);
  const haftaSonu = new Date(haftaBasi);
  haftaSonu.setDate(haftaBasi.getDate() + 6);

  const hId = hastaId || '';
  const gunler = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];

  let html = '<div style="font-size:0.8rem;color:var(--text2);margin-bottom:10px">Randevu tarihi seçin:</div>';

  // Hafta nav
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">';
  html += '<button class="btn btn-secondary" onclick="takvimHaftaOffset--;renderTakvimFormMod(\'' + hId + '\')">◀</button>';
  html += '<div style="flex:1;text-align:center;font-size:0.85rem;color:var(--text2)">' + haftaBasi.toLocaleDateString('tr-TR') + ' — ' + haftaSonu.toLocaleDateString('tr-TR') + '</div>';
  html += '<button class="btn btn-secondary" onclick="takvimHaftaOffset++;renderTakvimFormMod(\'' + hId + '\')">▶</button>';
  html += '</div>';

  // 7 günlük grid
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px">';
  for (let i = 0; i < 7; i++) {
    const gun = new Date(haftaBasi);
    gun.setDate(haftaBasi.getDate() + i);
    const gunStr = localDateStr(gun);
    const gunRandevular = randevular.filter(r => r.tarih === gunStr);
    const isBugun = gunStr === localDateStr(bugun);
    const mevcut = document.getElementById('r-tarih-edit') ? document.getElementById('r-tarih-edit').dataset.tarih : '';
    const isSecili = gunStr === mevcut;

    html += '<div onclick="takvimFormGunSec(\'' + gunStr + '\')" title="' + (gunRandevular.length > 0 ? gunRandevular.map(r=>r.hastaAdi).join(', ') : 'Randevu yok') + '"'
      + ' style="cursor:pointer;border-radius:8px;padding:6px 4px;text-align:center;transition:all .15s;'
      + (isSecili ? 'background:var(--accent);color:#fff;' : isBugun ? 'background:rgba(79,142,247,.2);border:1px solid var(--accent);' : 'background:var(--surface2);')
      + '">';
    html += '<div style="font-size:0.7rem;color:' + (isSecili ? 'rgba(255,255,255,.7)' : 'var(--text2)') + '">' + gunler[i] + '</div>';
    html += '<div style="font-size:0.85rem;font-weight:600">' + gun.getDate() + '</div>';
    if (gunRandevular.length > 0) {
      html += '<div style="font-size:0.65rem;background:' + (isSecili ? 'rgba(255,255,255,.3)' : 'var(--warn)') + ';color:' + (isSecili ? '#fff' : '#000') + ';border-radius:10px;padding:0 4px;margin-top:2px">' + gunRandevular.length + '</div>';
    }
    html += '</div>';
  }
  html += '</div>';

  html += '<button class="btn btn-secondary" style="width:100%" onclick="document.getElementById(\'takvim-modal\').style.display=\'none\';document.getElementById(\'randevu-modal\').style.display=\'flex\'">← Geri Dön</button>';

  body.innerHTML = html;
}

function takvimFormGunSec(tarih) {
  // Forma geri dön ve tarihi güncelle
  document.getElementById('takvim-modal').style.display = 'none';
  document.getElementById('randevu-modal').style.display = 'flex';
  const input = document.getElementById('r-tarih-edit');
  if (input) {
    input.value = formatTarih(tarih);
    input.dataset.tarih = tarih;
  }
}

function toggleCheck2(id1, id2) {

  el.querySelector('input').checked = el.classList.contains('checked');
}

function rTelEkle() {

function selectNeden(tip) {
  const ilacBtn = document.getElementById('neden-ilac-btn');
  const digerBtn = document.getElementById('neden-diger-btn');
  const ilacFields = document.getElementById('ilac-fields');
  const digerFields = document.getElementById('diger-fields');
  const raporFields = document.getElementById('rapor-fields');
  if (tip === 'ilac') {
    ilacBtn.classList.add('checked'); digerBtn.classList.remove('checked');
    ilacFields.style.display = 'block'; digerFields.style.display = 'none';
    if (raporFields) raporFields.style.display = 'block';
    ilacBtn.querySelector('input').checked = true;
  } else {
    digerBtn.classList.add('checked'); ilacBtn.classList.remove('checked');
    digerFields.style.display = 'block'; ilacFields.style.display = 'none';
    if (raporFields) raporFields.style.display = 'none';
    digerBtn.querySelector('input').checked = true;
  }
}

function saveRandevu(hastaId, tarih, existingId) {
  const adi = document.getElementById('r-adi').value.trim();
  if (!adi) { showToast('Hasta adı gerekli', 'error'); return; }
  const nedenEl = document.querySelector('input[name="r-neden"]:checked');
  const neden = nedenEl ? nedenEl.value : 'Diğer';

  // Tarihi formdan al (değiştirilebilir)
  const tarihInput = document.getElementById('r-tarih-edit');
  const gercekTarih = tarihInput ? (tarihInput.dataset.iso || tarih) : tarih;

  // Telefonları topla
  const telInputs = document.querySelectorAll('#r-phones-wrap .r-tel-input');
  const kimeInputs = document.querySelectorAll('#r-phones-wrap .r-tel-kime');
  const telefonlar = [];
  telInputs.forEach((t, i) => {
    const tel = t.value.trim();
    const kime = kimeInputs[i] ? kimeInputs[i].value.trim() : '';
    if (tel) telefonlar.push(kime ? tel + ' (' + kime + ')' : tel);
  });

  const randevu = {
    id: existingId || ('r_' + Date.now()),
    hastaId: hastaId || null,
    hastaAdi: adi,
    tcKimlik: document.getElementById('r-tc').value.trim(),
    hastaYasi: document.getElementById('r-yas').value,
    cinsiyet: document.getElementById('r-cinsiyet').value || (hastaId && hastalar.find(h=>h.id===hastaId) ? hastalar.find(h=>h.id===hastaId).cinsiyet : ''),
    telefon: telefonlar.join(' | '),
    tarih: gercekTarih, neden,
    ilacAdi: document.getElementById('r-ilac') ? document.getElementById('r-ilac').value.trim() : '',
    doz: document.getElementById('r-doz') ? document.getElementById('r-doz').value.trim() : '',
    kur: document.getElementById('r-kur') ? document.getElementById('r-kur').value : '',
    rapor: document.getElementById('r-rapor') ? document.getElementById('r-rapor').checked : false,
    form: document.getElementById('r-form') ? document.getElementById('r-form').checked : false,
    plan: document.getElementById('r-plan') ? document.getElementById('r-plan').value.trim() : '',
    not: document.getElementById('r-not').value.trim()
  };

  if (existingId) {
    const idx = randevular.findIndex(r => r.id === existingId);
    if (idx >= 0) randevular[idx] = randevu; else randevular.push(randevu);
  } else {
    randevular.push(randevu);
  }

  document.getElementById('randevu-modal').style.display = 'none';
  renderRandevu();
  showToast('✅ Randevu kaydedildi', 'success');
}

function editRandevu(randevuId, e) {
  if (e) e.stopPropagation();
  const r = randevular.find(r => r.id === randevuId);
  if (!r) return;
  openRandevuForm(r.hastaId, r.tarih, r.id);
}

function toggleYatti(id, e) {
  if (e) e.stopPropagation();
  const r = randevular.find(r => r.id === id);
  if (!r) return;
  r.yatti = !r.yatti;
  renderRandevu();
  showToast(r.yatti ? '✅ Yatış yapıldı' : '↩ Yatış iptal edildi', 'success');
}

function deleteRandevu(id, e) {
  if (e) e.stopPropagation();
  if (!confirm('Randevu silinsin mi?')) return;
  randevular = randevular.filter(r => r.id !== id);
  renderRandevu();
  showToast('🗑 Randevu silindi', 'success');
}

function closeRandevuModal(e) {
  if (e.target === document.getElementById('randevu-modal')) document.getElementById('randevu-modal').style.display = 'none';
}

// ── RANDEVU RENDER ──
let randevuSutunOffset = 0; // kaç hafta ileri

function renderRandevu() {
  const body = document.getElementById('body-randevu');
  const cnt = document.getElementById('cnt-randevu');
  const bugun = new Date();
  bugun.setHours(0,0,0,0);

  // Hafta başı
  const haftaBasi = new Date(bugun);
  haftaBasi.setDate(bugun.getDate() - bugun.getDay() + 1 + randevuSutunOffset * 7);
  const haftaSonu = new Date(haftaBasi);
  haftaSonu.setDate(haftaBasi.getDate() + 6);

  const haftaBasiStr = localDateStr(haftaBasi);
  const haftaSonuStr = localDateStr(haftaSonu);

  const bugunStr = localDateStr(bugun);

  const yatmayanlar = randevular.filter(r => {
    if (!r.tarih || r.yatti) return false;
    if (r.tarih >= haftaBasiStr) return false;
    if (r.tarih >= bugunStr) return false;
    if (filters.gender !== 'all') {
      const cin = r.cinsiyet || (r.hastaId ? (hastalar.find(h=>h.id===r.hastaId)||{}).cinsiyet : '');
      if (cin !== filters.gender) return false;
    }
    return true;
  }).sort((a,b) => a.tarih.localeCompare(b.tarih));

  const yakin = randevular.filter(r => {
    if (!r.tarih || r.tarih < haftaBasiStr || r.tarih > haftaSonuStr) return false;
    if (filters.gender !== 'all') {
      const cin = r.cinsiyet || (r.hastaId ? (hastalar.find(h=>h.id===r.hastaId)||{}).cinsiyet : '');
      if (cin !== filters.gender) return false;
    }
    return true;
  }).sort((a,b) => a.tarih.localeCompare(b.tarih));

  const tumListe = [...yatmayanlar, ...yakin];
  cnt.textContent = tumListe.length;
  body.innerHTML = '';

  // Hafta navigasyon
  const navDiv = document.createElement('div');
  navDiv.style.cssText = 'display:flex;align-items:center;gap:6px;padding:8px 8px 4px;border-bottom:1px solid var(--border);margin-bottom:6px';
  navDiv.innerHTML = '<button class="arrow-btn" onclick="randevuSutunOffset--;renderRandevu()" style="opacity:1">◀</button>'
    + '<span style="flex:1;text-align:center;font-size:0.72rem;color:var(--text2)">'
    + haftaBasi.toLocaleDateString('tr-TR') + ' — ' + haftaSonu.toLocaleDateString('tr-TR')
    + '</span>'
    + '<button class="arrow-btn" onclick="randevuSutunOffset++;renderRandevu()" style="opacity:1">▶</button>';
  body.appendChild(navDiv);

  if (tumListe.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:16px;text-align:center;color:var(--text2);font-size:0.82rem';
    empty.textContent = 'Bu hafta randevu yok';
    body.appendChild(empty);
    return;
  }

  // Yatmayan uyarısı
  if (yatmayanlar.length > 0) {
    const uyari = document.createElement('div');
    uyari.style.cssText = 'font-size:0.7rem;font-weight:700;color:var(--danger);padding:6px 8px 2px;letter-spacing:.3px';
    uyari.textContent = '⚠ Yatmayan Hastalar';
    body.appendChild(uyari);
  }

  const grouped = {};
  tumListe.forEach(r => { if (!grouped[r.tarih]) grouped[r.tarih] = []; grouped[r.tarih].push(r); });
  const gunlerTam = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];

  Object.entries(grouped).sort().forEach(([tarih, rans]) => {
    const d = parseDate(tarih);
    const hepsiYatti = rans.every(r => r.yatti);
    const header = document.createElement('div');
    header.style.cssText = 'font-size:0.7rem;font-weight:700;color:' + (hepsiYatti?'var(--text2)':'var(--accent)') + ';padding:6px 8px 2px;text-transform:uppercase;cursor:' + (hepsiYatti?'pointer':'default');
    header.textContent = gunlerTam[d.getDay()] + ' ' + d.toLocaleDateString('tr-TR') + (hepsiYatti?' ✓ (görmek için tıkla)':'');
    if (hepsiYatti) {
      let gizli = true;
      header.addEventListener('click', () => {
        gizli = !gizli;
        body.querySelectorAll('[data-grp="'+tarih+'"]').forEach(c => c.style.display = gizli?'none':'block');
        header.textContent = gunlerTam[d.getDay()] + ' ' + d.toLocaleDateString('tr-TR') + (gizli?' ✓ (görmek için tıkla)':' ✓');
      });
    }
    body.appendChild(header);

    rans.forEach(r => {
      const card = document.createElement('div');
      const rCinsiyet = r.cinsiyet || (r.hastaId ? (hastalar.find(h=>h.id===r.hastaId)||{}).cinsiyet : '');
      const rGenderClass = rCinsiyet === 'Erkek' ? 'male' : rCinsiyet === 'Kadın' ? 'female' : '';
      card.className = 'card ' + rGenderClass;
      const devirBadge2 = '';
      const doktorBadge2 = '';
      const isYatmayan = !r.yatti && r.tarih < localDateStr(new Date());
      if (r.yatti) { card.style.opacity = '0.45'; card.style.filter = 'grayscale(50%)'; }
      card.innerHTML = '<div class="card-inner">'
        + '<div class="card-body">'
        + '<div class="card-name" style="font-size:0.82rem">'
        + (isYatmayan ? '<span style="color:#f74f4f;font-size:0.85rem;margin-right:3px" title="Yatmadı">▲</span>' : '')
        + r.hastaAdi
        + (r.yatti ? ' <span style="font-size:0.68rem;color:var(--success)">✓</span>' : '')
        + '</div>'
        + '<div class="card-meta">'
        + '<span style="font-size:0.72rem;color:var(--accent2)">' + r.neden + '</span>'
        + (r.ilacAdi ? '<span class="card-days">' + r.ilacAdi + (r.doz?' '+r.doz:'') + (r.kur?' K'+r.kur:'') + '</span>' : '')
        + (r.rapor ? '<span style="font-size:0.65rem;background:rgba(79,142,247,.15);color:var(--accent);padding:1px 4px;border-radius:3px">📄</span>' : '')
        + (r.form ? '<span style="font-size:0.65rem;background:rgba(124,106,247,.15);color:var(--accent2);padding:1px 4px;border-radius:3px">📋</span>' : '')
        + (rCinsiyet ? '<span class="card-gender ' + rGenderClass + '">' + rCinsiyet + '</span>' : '')
        + '</div>'
        + '<button onclick="toggleYatti(\'' + r.id + '\',event)" style="margin-top:4px;background:' + (r.yatti?'rgba(79,247,158,.12)':'transparent') + ';border:1px solid ' + (r.yatti?'var(--success)':'var(--border)') + ';color:' + (r.yatti?'var(--success)':'var(--text2)') + ';border-radius:6px;padding:2px 8px;font-size:0.72rem;cursor:pointer;width:100%;text-align:left">'
        + (r.yatti ? '✓ Yattı  ·  İptal için tıklayın' : '○ Yattı işaretle') + '</button>'
        + '</div>'
        + '<div class="arrow-wrap">'
        + '<button class="arrow-btn" onclick="editRandevu(\'' + r.id + '\',event)">✏</button>'
        + '<button class="arrow-btn" onclick="deleteRandevu(\'' + r.id + '\',event)" style="color:var(--danger)">✕</button>'
        + '</div></div>';
      card.dataset.grp = tarih;
      if (hepsiYatti) card.style.display = 'none';
      card.addEventListener('click', e => { if (!e.target.classList.contains('arrow-btn') && !e.target.closest('button')) openRandevuDetail(r); });
      body.appendChild(card);
    });
  });
}

function openRandevuDetail(r) {
  const rCinsiyetModal = r.cinsiyet || (r.hastaId ? (hastalar.find(h=>h.id===r.hastaId)||{}).cinsiyet : '');
  const rGenderColor = rCinsiyetModal === 'Erkek' ? 'var(--male)' : 'var(--female)';
  document.getElementById('takvim-modal-body').innerHTML = `
    <div class="detail-row"><span class="detail-label">Hasta</span><span class="detail-value">${r.hastaAdi}${rCinsiyetModal ? ' <span style="color:'+rGenderColor+';font-size:0.85rem">('+rCinsiyetModal+')</span>' : ''}</span></div>
    <div class="detail-row"><span class="detail-label">Tarih</span><span class="detail-value">${parseDate(r.tarih).toLocaleDateString('tr-TR')}</span></div>
    <div class="detail-row"><span class="detail-label">Neden</span><span class="detail-value">${r.neden}</span></div>
    ${r.ilacAdi ? '<div class="detail-row"><span class="detail-label">İlaç</span><span class="detail-value">'+r.ilacAdi+'</span></div>' : ''}
    ${r.doz ? '<div class="detail-row"><span class="detail-label">Doz</span><span class="detail-value">'+r.doz+'</span></div>' : ''}
    ${r.kur ? '<div class="detail-row"><span class="detail-label">Kür</span><span class="detail-value">'+r.kur+'</span></div>' : ''}
    ${r.plan ? '<div class="detail-row"><span class="detail-label">Plan</span><span class="detail-value" style="white-space:pre-wrap">'+r.plan+'</span></div>' : ''}
    <div class="detail-row"><span class="detail-label">Rapor</span><span class="detail-value">${r.rapor ? '✅ Var' : '❌ Yok'}</span></div>
    <div class="detail-row"><span class="detail-label">Form</span><span class="detail-value">${r.form ? '✅ Var' : '❌ Yok'}</span></div>
    ${r.not ? '<div class="detail-row"><span class="detail-label">Not</span><span class="detail-value">'+r.not+'</span></div>' : ''}
    <hr class="detail-divider">
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn ${r.yatti?'btn-secondary':'btn-primary'}" onclick="toggleYatti('${r.id}');document.getElementById('takvim-modal').style.display='none'">${r.yatti?'↩ Yatışı İptal':'✅ Yattı İşaretle'}</button>
      <button class="btn btn-secondary" onclick="editRandevu('${r.id}');document.getElementById('takvim-modal').style.display='none'">✏ Düzenle</button>
      <button class="btn btn-secondary" style="color:var(--danger)" onclick="deleteRandevu('${r.id}');document.getElementById('takvim-modal').style.display='none'">🗑 Sil</button>
    </div>`;
  document.getElementById('takvim-modal').style.display = 'flex';
}


// ── TOAST ──
function showToast(msg, type='', duration=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  clearTimeout(t._to);
  t._to = setTimeout(() => t.className = '', duration);
}

// ── OTOMATIK YÜKLEME ──
window.addEventListener('load', () => {
  render();
  renderRandevu();

  // Açılışta Drive veya lokal seçeneği sun
  const hasLocal = !!localStorage.getItem('rheum_durum');

  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;display:flex;align-items:center;justify-content:center';
  modal.innerHTML = `
    <div style="background:#181c27;border:1px solid #2a3050;border-radius:16px;padding:32px;max-width:400px;width:90%;text-align:center">
      <div style="font-size:2rem;margin-bottom:12px">🏥</div>
      <h2 style="color:#e8ecf5;font-size:1.1rem;margin-bottom:8px">RHEUM-ADMIT</h2>
      <p style="color:#8892b0;font-size:0.85rem;margin-bottom:24px">Veri kaynağını seçin</p>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button onclick="startWithDrive(this.closest('div').parentElement.parentElement)" 
          style="background:#4f8ef7;color:#fff;border:none;border-radius:10px;padding:14px;font-size:0.95rem;font-weight:600;cursor:pointer">
          ☁ Drive ile Bağlan
          <div style="font-size:0.75rem;font-weight:400;opacity:.8;margin-top:2px">Güncel veri + tüm özellikler</div>
        </button>
        <button onclick="startWithLocal(this.closest('div').parentElement.parentElement)"
          style="background:#1e2336;color:#8892b0;border:1px solid #2a3050;border-radius:10px;padding:14px;font-size:0.95rem;cursor:pointer">
          💾 Yerel Yedekten Aç
          <div style="font-size:0.75rem;opacity:.7;margin-top:2px">${hasLocal ? 'Son yedek mevcut' : 'Yedek bulunamadı — boş açılır'}</div>
        </button>
        <button onclick="startEmpty(this.closest('div').parentElement.parentElement)"
          style="background:transparent;color:#4a5568;border:none;font-size:0.8rem;cursor:pointer;padding:8px">
          Boş başla
        </button>
      </div>
    </div>`;
  document.body.appendChild(modal);
});

function startWithDrive(modal) {
  modal.remove();
  try { initDrive(); } catch(e) { showToast('Drive başlatılamadı', 'error'); }
}

function startWithLocal(modal) {
  modal.remove();
  try {
    const saved = localStorage.getItem('rheum_durum');
    if (saved) {
      const data = JSON.parse(saved);
      hastalar = data.hastalar || [];
      pinnedIds = new Set(data.pinnedIds || []);
      patientNotes = data.patientNotes || {};
      manualOrder = data.manualOrder || {};
      manualMoved = new Set(data.manualMoved || []);
      blacklist = new Set(data.blacklist || []);
      randevular = data.randevular || [];
      render();
      renderRandevu();
      showToast('💾 Yerel yedekten yüklendi', 'success');
    }
  } catch(e) { showToast('Yedek okunamadı', 'error'); }
}

function startEmpty(modal) {
  modal.remove();
  render();
}
</script>
</body>
</html>
