<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHEUM-ADMIT — Dış Randevu/Taburcu</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#0f1117; --surface:#181c27; --surface2:#1e2336;
  --border:#2a3050; --accent:#4f8ef7; --accent2:#7c6af7;
  --text:#e8ecf5; --text2:#8892b0;
  --success:#4ff79e; --danger:#f74f4f; --warn:#f7a74f;
  --male:#4f8ef7; --female:#f76fa8;
  --devir:#f7a74f; --A-color:#f74f4f;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.topbar{background:#0d1520;border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.topbar h1{font-size:1.1rem;color:var(--accent);flex-shrink:0}
.topbar-actions{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
.btn{padding:7px 16px;border-radius:8px;border:none;font-size:0.82rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-warn{background:var(--warn);color:#000}
.btn:hover{opacity:.85}

/* BOARD (Tek Kolon) */
.board{display:flex;justify-content:center;padding:20px;flex:1;}
.col{border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;width:100%;max-width:600px;background:var(--surface);}
.col-header{padding:12px 14px;border-bottom:1px solid var(--border);background:var(--surface);font-size:0.85rem;font-weight:700;display:flex;align-items:center;gap:8px;flex-shrink:0}
.col-header .count{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:2px 8px;font-size:0.72rem;color:var(--text2);margin-left:auto}
.col-body{flex:1;overflow-y:auto;padding:8px}
.col-body::-webkit-scrollbar{width:4px}
.col-body::-webkit-scrollbar-track{background:transparent}
.col-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* CARDS */
.card{border-radius:10px;border:1px solid var(--border);background:var(--surface2);margin-bottom:6px;cursor:pointer;transition:border-color .2s,transform .1s;position:relative;overflow:hidden}
.card:hover{border-color:var(--accent);transform:translateY(-1px)}
.card.male{border-left:3px solid var(--male)}
.card.female{border-left:3px solid var(--female)}

.card-body{padding:10px 12px}
.card-name{font-size:0.9rem;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.card-days{font-size:0.75rem;color:var(--text2)}
.card-gender{font-size:0.72rem;padding:2px 7px;border-radius:10px;font-weight:600}
.card-gender.male{background:rgba(79,142,247,.15);color:var(--male)}
.card-gender.female{background:rgba(247,111,168,.15);color:var(--female)}
.card-note{margin-top:6px;font-size:0.75rem;color:var(--text2);background:var(--bg);border-radius:6px;padding:5px 8px;border-left:2px solid var(--accent2)}
.arrow-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);width:24px;height:24px;border-radius:5px;cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.arrow-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.modal-header h2{font-size:1rem;flex:1}
.modal-close{background:var(--surface2);border:1px solid var(--border);color:var(--text2);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.modal-body{padding:18px 20px}
.detail-row{display:flex;gap:8px;margin-bottom:8px;font-size:0.85rem}
.detail-label{color:var(--text2);width:140px;flex-shrink:0}
.detail-value{color:var(--text);flex:1}
.detail-divider{border:none;border-top:1px solid var(--border);margin:10px 0}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 22px;border-radius:10px;font-size:0.85rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:300;white-space:nowrap}
#toast.show{opacity:1}
#toast.success{border-color:var(--success);color:var(--success)}
#toast.error{border-color:var(--danger);color:var(--danger)}

.check-item {display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.85rem;color:var(--text2);transition:all .2s;}
.check-item.checked {background:var(--accent);color:#fff;border-color:var(--accent);}
.check-item input {display:none;}
.field {margin-bottom: 12px;}
.field label {display:block;margin-bottom:4px;font-size:0.8rem;color:var(--text2);}
.field input, .field select, .field textarea {width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;font-size:0.9rem;}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
</head>
<body>

<div class="topbar">
  <h1>📅 Dış Randevu/Taburcu Arayüzü</h1>
  <div style="display:inline-flex;align-items:center;gap:6px">
    <button id="drive-connect-btn" onclick="initDrive(true)" style="font-size:0.75rem;color:var(--text2);background:var(--surface2);padding:3px 10px;border-radius:6px;border:1px solid var(--border);cursor:pointer">☁ Drive Bağlan</button>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-secondary" style="color:var(--accent2);border-color:var(--accent2)" onclick="openTakvimModal()">📅 + Yeni Kayıt Ekle</button>
    <button class="btn btn-secondary" onclick="syncFromDrive()" id="btn-sync">🔄 Yenile</button>
  </div>
</div>

<div class="board">
  <div class="col" id="col-randevu">
    <div class="col-header">
      <span>📅</span> Taburcu / Randevu Listesi (Ortak)
      <span class="count" id="cnt-randevu">0</span>
    </div>
    <div class="col-body" id="body-randevu" style="background:var(--bg)"></div>
  </div>
</div>

<!-- RANDEVU FORM MODAL -->
<div class="modal-overlay" id="randevu-modal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal" style="max-width:540px">
    <div class="modal-header">
      <h2 id="randevu-modal-title">Yeni Randevu Talebi Oluştur</h2>
      <button class="modal-close" onclick="document.getElementById('randevu-modal').style.display='none'">✕</button>
    </div>
    <div class="modal-body" id="randevu-modal-body"></div>
  </div>
</div>

<!-- TAKVİM MODAL -->
<div class="modal-overlay" id="takvim-modal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal" style="max-width:540px">
    <div class="modal-header">
      <h2 id="takvim-modal-title">Randevu Takvimi</h2>
      <button class="modal-close" onclick="document.getElementById('takvim-modal').style.display='none'">✕</button>
    </div>
    <div class="modal-body" id="takvim-modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const DRIVE_CLIENT_ID = '760070734433-ho3s6vo856qf06gtfpo5d7tou5npk33l.apps.googleusercontent.com';
const DRIVE_FOLDER_ID = '1WwjCPb3GIsPmgoFWiqnuA1R6BZlp-zPS';
let driveAccessToken = null;
let randevuSifreHash = null;
let isAuthenticated = false;

// Veriler
let allRandevular = []; // Main JSON randevular + Outer JSON randevular bileşimi
let isLocalMode = false;
let pendingLocalRans = JSON.parse(localStorage.getItem('rheum_outer_pending') || '[]');

function showToast(msg, type='', duration=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  clearTimeout(t._to);
  t._to = setTimeout(() => t.className = '', duration);
}

function initDrive(forceSelect = false) {
  isLocalMode = false;
  if (forceSelect) localStorage.removeItem('rheum_outer_acc');
  window.tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: DRIVE_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/drive',
    prompt: '',
    callback: async (resp) => {
      if (resp.error) {
        showToast('Drive bağlantı hatası: ' + resp.error, 'error');
        return;
      }
      driveAccessToken = resp.access_token;
      document.getElementById('drive-connect-btn').textContent = '☁ Bağlı';
      document.getElementById('drive-connect-btn').style.color = 'var(--success)';
      await loadConfigAndAuth();
    }
  });
  window.tokenClient.requestAccessToken({prompt: forceSelect || !localStorage.getItem('rheum_outer_acc') ? 'select_account' : ''});
  localStorage.setItem('rheum_outer_acc', '1');
}

async function loadConfigAndAuth() {
  try {
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='rheum_config.json' and '${DRIVE_FOLDER_ID}' in parents and trashed=false&fields=files(id)`,
      { headers: { Authorization: 'Bearer ' + driveAccessToken } }
    );
    const data = await res.json();
    if (data.files && data.files.length > 0) {
      const contentRes = await fetch(
        `https://www.googleapis.com/drive/v3/files/${data.files[0].id}?alt=media`,
        { headers: { Authorization: 'Bearer ' + driveAccessToken } }
      );
      const config = await contentRes.json();
      randevuSifreHash = config.randevuSifreHash || null;
    }
  } catch(e) { console.warn('Config yükleme hatası:', e); }

  if (randevuSifreHash) localStorage.setItem('rheum_outer_pw', randevuSifreHash);   
  else randevuSifreHash = localStorage.getItem('rheum_outer_pw'); // fallback

  if (!randevuSifreHash) {
    showToast('⚠ Dış randevu şifresi henüz Değerlendirme ekranından ayarlanmamış!', 'error', 6000);
    return;
  }
  
  if (!isAuthenticated) {
    showLoginModal();
  } else {
    syncFromDrive();
  }
}

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function showLoginModal() {
  const overlay = document.createElement('div');
  overlay.id = 'login-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML = `
    <div style="background:#181c27;border:1px solid #2a3050;border-radius:16px;padding:32px;max-width:360px;width:90%;text-align:center">
      <div style="font-size:2rem;margin-bottom:10px">📅</div>
      <h2 style="color:#e8ecf5;font-size:1rem;margin-bottom:6px">Dış Randevu Girişi</h2>
      <p style="color:#8892b0;font-size:0.82rem;margin-bottom:20px">Lütfen şifrenizi girin</p>
      <input type="password" id="login-pw" placeholder="Şifre" autofocus
        style="width:100%;background:#1e2336;border:1px solid #2a3050;color:#e8ecf5;padding:12px;border-radius:10px;font-size:1rem;margin-bottom:12px;box-sizing:border-box">
      <button onclick="checkLogin()" style="width:100%;background:#4f8ef7;color:#fff;border:none;border-radius:10px;padding:12px;font-size:0.95rem;cursor:pointer">Giriş</button>
      <div id="login-hata" style="color:#f74f4f;font-size:0.8rem;margin-top:8px"></div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('keydown', e => { if (e.key === 'Enter') checkLogin(); });
}

async function checkLogin() {
  const pw = document.getElementById('login-pw').value;
  const hash = await sha256(pw);
  if (hash === randevuSifreHash) {
    isAuthenticated = true;
    document.getElementById('login-overlay').remove();
    showToast('✅ Giriş başarılı', 'success');
    if (!isLocalMode) {
      await uploadPendingRans();
      syncFromDrive();
    } else {
      loadLocalState();
    }
  } else {
    document.getElementById('login-hata').textContent = '❌ Yanlış şifre';
    document.getElementById('login-pw').value = '';
    document.getElementById('login-pw').focus();
  }
}

async function uploadPendingRans() {
   if (pendingLocalRans.length === 0) return;
   showToast("⏳ Bekleyen lokal kayıtlar Drive'a yükleniyor...", "warn");
   let basarili = 0;
   const yeniKalan = [];
   for (const r of pendingLocalRans) {
      const id = 'randevu_' + Date.now() + '_' + Math.floor(Math.random()*1000) + '.json';
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({name:id, parents:[DRIVE_FOLDER_ID]})], {type:'application/json'}));
      form.append('file', new Blob([JSON.stringify(r)], {type:'application/json'}));
      try {
        const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
          method: 'POST', headers: { Authorization: 'Bearer ' + driveAccessToken }, body: form
        });
        if(res.ok) basarili++; else yeniKalan.push(r);
      } catch(e) { yeniKalan.push(r); }
   }
   pendingLocalRans = yeniKalan;
   localStorage.setItem('rheum_outer_pending', JSON.stringify(pendingLocalRans));
   if (basarili > 0) showToast("✅ " + basarili + " lokal kayıt Drive'a aktarıldı!", "success", 4000);
}

function saveLocalState() {
   localStorage.setItem('rheum_outer_local_all', JSON.stringify(allRandevular));
}
function loadLocalState() {
   allRandevular = JSON.parse(localStorage.getItem('rheum_outer_local_all') || '[]');
   // Add pending logic
   allRandevular = [...allRandevular.filter(r => !r._isTempLocal), ...pendingLocalRans.map(r => ({...r, _isTempLocal:true}))];
   renderRandevuBoard();
}

async function syncFromDrive() {
  if (!driveAccessToken || !isAuthenticated) return;
  document.getElementById('btn-sync').textContent = '⏳...';
  
  try {
    // 1. Ana durum dosyasını oku
    let mainRandevular = [];
    const durRes = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name startsWith 'rheum_durum_' and '${DRIVE_FOLDER_ID}' in parents and trashed=false&fields=files(id)&orderBy=modifiedTime desc&pageSize=1`,
      { headers: { Authorization: 'Bearer ' + driveAccessToken } }
    );
    const durData = await durRes.json();
    if (durData.files && durData.files.length > 0) {
      const cntRes = await fetch(
        `https://www.googleapis.com/drive/v3/files/${durData.files[0].id}?alt=media`,
        { headers: { Authorization: 'Bearer ' + driveAccessToken } }
      );
      const mainState = await cntRes.json();
      mainRandevular = mainState.randevular || [];
    }

    // 2. Dışarıdan eklenmiş bekleyen randevuları oku
    const rQuery = `https://www.googleapis.com/drive/v3/files?q='${DRIVE_FOLDER_ID}' in parents and name startsWith 'randevu_' and mimeType='application/json' and trashed=false&fields=files(id)&pageSize=100`;
    const rRes = await fetch(rQuery, { headers: { Authorization: 'Bearer ' + driveAccessToken } });
    const rData = await rRes.json();
    const outerFiles = rData.files || [];
    
    let outerRandevular = [];
    for (const f of outerFiles) {
       const cntRes = await fetch(
         `https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`,
         { headers: { Authorization: 'Bearer ' + driveAccessToken } }
       );
       const rJson = await cntRes.json();
       rJson._isOuter = true; // flag to show it is pending externally
       rJson._fileId = f.id;
       outerRandevular.push(rJson);
    }
    
    allRandevular = [...mainRandevular, ...outerRandevular];
    saveLocalState();
    renderRandevuBoard();
    
    document.getElementById('btn-sync').textContent = '🔄 Yenile';
  } catch(e) {
    document.getElementById('btn-sync').textContent = '🔄 Yenile';
    showToast('❌ Senkronizasyon hatası', 'error');
  }
}

function toggleCheck(el, id2) {
  el.classList.toggle('checked');
  el.querySelector('input').checked = el.classList.contains('checked');
  if (id2) {
    const el2 = document.getElementById(id2);
    if (el.classList.contains('checked')) {
      el2.classList.remove('checked');
      el2.querySelector('input').checked = false;
    }
  }
}
function selectNeden(tip) {
  const ilacBtn = document.getElementById('neden-ilac-btn');
  const digerBtn = document.getElementById('neden-diger-btn');
  const ilacFields = document.getElementById('ilac-fields');
  const digerFields = document.getElementById('diger-fields');
  const raporFields = document.getElementById('rapor-fields');
  if (tip === 'ilac') {
    ilacBtn.classList.add('checked'); digerBtn.classList.remove('checked');
    ilacFields.style.display = 'block'; digerFields.style.display = 'none';
    if (raporFields) raporFields.style.display = 'block';
    ilacBtn.querySelector('input').checked = true;
  } else {
    digerBtn.classList.add('checked'); ilacBtn.classList.remove('checked');
    digerFields.style.display = 'block'; ilacFields.style.display = 'none';
    if (raporFields) raporFields.style.display = 'none';
    digerBtn.querySelector('input').checked = true;
  }
}

function openTakvimModal() {
  document.getElementById('randevu-modal').style.display = 'none';
  window.takvimHaftaOffset = 0;
  renderTakvimMod();
  document.getElementById('takvim-modal').style.display = 'flex';
}

function renderTakvimMod() {
  const body = document.getElementById('takvim-modal-body');
  const bugun = new Date(); bugun.setHours(0,0,0,0);
  const haftaBasi = new Date(bugun); haftaBasi.setDate(bugun.getDate() - bugun.getDay() + 1 + window.takvimHaftaOffset * 7);
  const haftaSonu = new Date(haftaBasi); haftaSonu.setDate(haftaBasi.getDate() + 6);
  const gunler = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
  
  let html = '<div style="font-size:0.8rem;color:var(--text2);margin-bottom:10px">Randevu / Taburcu tarihi seçin:</div>';
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">';
  html += '<button class="btn btn-secondary" onclick="window.takvimHaftaOffset--;renderTakvimMod()">◀</button>';
  html += '<div style="flex:1;text-align:center;font-size:0.85rem;color:var(--text2)">' + haftaBasi.toLocaleDateString('tr-TR') + ' — ' + haftaSonu.toLocaleDateString('tr-TR') + '</div>';
  html += '<button class="btn btn-secondary" onclick="window.takvimHaftaOffset++;renderTakvimMod()">▶</button>';
  html += '</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px">';

  for (let i = 0; i < 7; i++) {
    const gun = new Date(haftaBasi); gun.setDate(haftaBasi.getDate() + i);
    const gunStr = new Date(gun.getTime() - gun.getTimezoneOffset()*60000).toISOString().split('T')[0];
    const gunRandevular = allRandevular.filter(r => r.tarih === gunStr);
    const isBugun = gunStr === new Date(bugun.getTime() - bugun.getTimezoneOffset()*60000).toISOString().split('T')[0];

    let titleStr = gunRandevular.length > 0 ? gunRandevular.map(r=>r.hastaAdi).join(', ') : 'Randevu yok';
    html += '<div onclick="takvimGunSec(' + "'" + gunStr + "'" + ')" title="' + titleStr + '"'
      + ' style="cursor:pointer;border-radius:8px;padding:6px 4px;text-align:center;transition:all .15s;'
      + (isBugun ? 'background:rgba(79,142,247,.2);border:1px solid var(--accent);' : 'background:var(--surface2);')
      + '">';
    html += '<div style="font-size:0.7rem;color:var(--text2)">' + gunler[i] + '</div>';
    html += '<div style="font-size:0.85rem;font-weight:600">' + gun.getDate() + '</div>';
    if (gunRandevular.length > 0) {
      html += '<div style="font-size:0.65rem;background:var(--warn);color:#000;border-radius:10px;padding:1px 4px;margin-top:2px">' + gunRandevular.length + ' Hasta</div>';
      html += '<div style="font-size:0.55rem;color:var(--text2);margin-top:2px;line-height:1.2;word-break:break-word">' + gunRandevular.map(r=>r.hastaAdi.split(' ')[0]).join(', ') + '</div>';
    }
    html += '</div>';
  }
  html += '</div>';
  body.innerHTML = html;
}

function takvimGunSec(isoTarih) {
  document.getElementById('takvim-modal').style.display = 'none';
  openRandevuForm(isoTarih);
}

function openRandevuForm(isoTarih = null) {
  let dateObj = new Date();
  if (isoTarih) { try { dateObj = new Date(isoTarih); } catch(e){} }
  const localBugun = dateObj.toLocaleDateString('tr-TR');
  const localIso = isoTarih || new Date(dateObj.getTime() - dateObj.getTimezoneOffset()*60000).toISOString().split('T')[0];

  document.getElementById('randevu-modal-title').textContent = 'Yeni Randevu Talebi Oluştur';
  document.getElementById('randevu-modal-body').innerHTML = `
    <div style="display:grid;grid-template-columns:100px 1fr;gap:10px;margin-bottom:10px">
      <div class="field"><label>Tarih</label><input type="text" id="r-tarih-edit" value="${localBugun}" data-iso="${localIso}" placeholder="GG.AA.YYYY" readonly style="cursor:pointer;background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700" onclick="document.getElementById('randevu-modal').style.display='none';document.getElementById('takvim-modal').style.display='flex'"></div>
      <div class="field"><label>Hasta Adı Soyadı *</label><input type="text" id="r-adi" placeholder="Ad Soyad" autofocus></div>
    </div>

      <button class="btn btn-primary" style="flex:1" onclick="submitRandevuRequest()">☁ Kaydı Gönder</button>

function rTelEkle() {
  const wrap = document.getElementById('r-phones-wrap');
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:6px;margin-bottom:4px';
  row.innerHTML = '<input type="tel" class="r-tel-input" placeholder="+90 5XX..." style="flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px">'
    + '<input type="text" class="r-tel-kime" placeholder="Kimin (ör. Eşi)" style="flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px">'
    + '<button onclick="this.parentElement.remove()" style="background:transparent;border:1px solid var(--border);color:var(--danger);border-radius:8px;padding:0 10px;cursor:pointer">✕</button>';
  wrap.appendChild(row);
}

function parseDateStr(str) { try{ const p=str.split('.'); return new Date(p[2], p[1]-1, p[0]); } catch(e){ return null; } }
function getIsoDate(str) { 
  if(str.indexOf('T')>0) return str.split('T')[0]; 
  const d = parseDateStr(str); 
  return d ? new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0] : str; 
}

async function submitRandevuRequest() {
  const adi = document.getElementById('r-adi').value.trim();
  if (!adi) { showToast('Hasta adı gerekli', 'error'); return; }
  const nedenEl = document.querySelector('input[name="r-neden"]:checked');
  const neden = nedenEl ? nedenEl.value : 'Diğer';
  const rawTarih = document.getElementById('r-tarih-edit').value;
  const isoTarih = getIsoDate(rawTarih);

  const telInputs = document.querySelectorAll('#r-phones-wrap .r-tel-input');
  const kimeInputs = document.querySelectorAll('#r-phones-wrap .r-tel-kime');
  const telefonlar = [];
  telInputs.forEach((t, i) => {
    const tel = t.value.trim();
    const kime = kimeInputs[i] ? kimeInputs[i].value.trim() : '';
    if (tel) telefonlar.push(kime ? tel + ' (' + kime + ')' : tel);
  });

  const randevuObj = {
    hastaAdi: adi,
    tcKimlik: document.getElementById('r-tc').value.trim(),
    hastaYasi: document.getElementById('r-yas').value,
    cinsiyet: document.getElementById('r-cinsiyet').value,
    telefon: telefonlar.join(' | '),
    tarih: isoTarih, neden,
    ilacAdi: document.getElementById('r-ilac') ? document.getElementById('r-ilac').value.trim() : '',
    doz: document.getElementById('r-doz') ? document.getElementById('r-doz').value.trim() : '',
    kur: document.getElementById('r-kur') ? document.getElementById('r-kur').value : '',
    rapor: document.getElementById('r-rapor') ? document.getElementById('r-rapor').checked : false,
    form: document.getElementById('r-form') ? document.getElementById('r-form').checked : false,
    plan: document.getElementById('r-plan') ? document.getElementById('r-plan').value.trim() : '',
    not: document.getElementById('r-not').value.trim()
  };

  if (isLocalMode) {
    randevuObj._isOuter = true;
    pendingLocalRans.push(randevuObj);
    localStorage.setItem('rheum_outer_pending', JSON.stringify(pendingLocalRans));
    allRandevular.push({...randevuObj, _isTempLocal:true});
    saveLocalState();
    document.getElementById('randevu-modal').style.display = 'none';
    renderRandevuBoard();
    showToast('✅ Lokal kaydedildi. İnternete bağlanınca gönderilecek.', 'success');
    return;
  }

  const id = 'randevu_' + Date.now() + '_' + Math.floor(Math.random()*1000) + '.json';
  
  if (!driveAccessToken) { showToast('Drive bağlantısı yok!', 'error'); return; }
  
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify({name:id, parents:[DRIVE_FOLDER_ID]})], {type:'application/json'}));
  form.append('file', new Blob([JSON.stringify(randevuObj)], {type:'application/json'}));
  
  try {
    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST', headers: { Authorization: 'Bearer ' + driveAccessToken }, body: form
    });
    if (res.ok) {
      showToast('✅ Randevu talebi başarıyla iletildi!', 'success');
      document.getElementById('randevu-modal').style.display = 'none';
      randevuObj._isOuter = true;
      allRandevular.push(randevuObj);
      renderRandevuBoard();
    } else {
      showToast('❌ İletilemedi.', 'error');
    }
  } catch(e) {
    showToast('❌ Ağ hatası.', 'error');
  }
}

// Render the single column board
let sutunOffset = 0;
function renderRandevuBoard() {
  const body = document.getElementById('body-randevu');
  const cnt = document.getElementById('cnt-randevu');
  const bugun = new Date(); bugun.setHours(0,0,0,0);

  const haftaBasi = new Date(bugun); haftaBasi.setDate(bugun.getDate() - bugun.getDay() + 1 + sutunOffset * 7);
  const haftaSonu = new Date(haftaBasi); haftaSonu.setDate(haftaBasi.getDate() + 6);
  
  function toStr(d) { return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0]; }
  const hbStr = toStr(haftaBasi);
  const hsStr = toStr(haftaSonu);

  const gecerli = allRandevular.filter(r => r.tarih >= hbStr && r.tarih <= hsStr).sort((a,b) => (a.tarih||'').localeCompare(b.tarih||''));

  cnt.textContent = gecerli.length;
  body.innerHTML = '';
  
  const navDiv = document.createElement('div');
  navDiv.style.cssText = 'display:flex;align-items:center;gap:6px;padding:4px;border-bottom:1px solid var(--border);margin-bottom:6px;position:sticky;top:0;background:var(--surface);z-index:1';
  navDiv.innerHTML = '<button class="arrow-btn" onclick="sutunOffset--;renderRandevuBoard()">◀</button>'
    + '<span style="flex:1;text-align:center;font-size:0.75rem;color:var(--text2)">' + haftaBasi.toLocaleDateString('tr-TR') + ' — ' + haftaSonu.toLocaleDateString('tr-TR') + '</span>'
    + '<button class="arrow-btn" onclick="sutunOffset++;renderRandevuBoard()">▶</button>';
  body.appendChild(navDiv);

  if (gecerli.length === 0) {
    const empty = document.createElement('div'); empty.style.cssText='padding:16px;text-align:center;color:var(--text2);font-size:0.85rem'; empty.textContent='Bu hafta randevu yok'; body.appendChild(empty);
    return;
  }

  const grouped = {};
  gecerli.forEach(r => { if (!grouped[r.tarih]) grouped[r.tarih] = []; grouped[r.tarih].push(r); });
  const gunlerTam = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];

  Object.entries(grouped).sort().forEach(([tarih, rans]) => {
    let d = new Date(); try{d=new Date(tarih);}catch(e){}
    const header = document.createElement('div');
    header.style.cssText = 'font-size:0.75rem;font-weight:700;color:var(--accent);padding:8px 8px 4px;text-transform:uppercase;';
    header.textContent = gunlerTam[d.getDay()] + ' ' + d.toLocaleDateString('tr-TR');
    body.appendChild(header);

    rans.forEach(r => {
      const card = document.createElement('div');
      const rGenderClass = r.cinsiyet === 'Erkek' ? 'male' : r.cinsiyet === 'Kadın' ? 'female' : '';
      card.className = 'card ' + rGenderClass;
      if (r.yatti) { card.style.opacity = '0.5'; }
      
      const statusBadge = r._isOuter ? '<span style="font-size:0.65rem;background:rgba(247,167,79,.2);color:#f7a74f;padding:2px 6px;border-radius:4px;margin-left:auto">⏳ Onay Bekliyor</span>' 
         : '';

      card.innerHTML = '<div class="card-inner">'
        + '<div class="card-body">'
        + '<div class="card-name" style="font-size:0.85rem">' + r.hastaAdi + (r.yatti ? ' <span style="font-size:0.68rem;color:var(--success)">✓ Yattı</span>' : '') + statusBadge + '</div>'
        + '<div class="card-meta">'
        + '<span style="font-size:0.75rem;color:var(--accent2)">' + r.neden + '</span>'
        + (r.ilacAdi ? '<span class="card-days">' + r.ilacAdi + (r.doz?' '+r.doz:'') + (r.kur?' K'+r.kur:'') + '</span>' : '')
        + (r.rapor ? '<span style="font-size:0.65rem;background:rgba(79,142,247,.15);color:var(--accent);padding:1px 4px;border-radius:3px">📄</span>' : '')
        + (r.form ? '<span style="font-size:0.65rem;background:rgba(124,106,247,.15);color:var(--accent2);padding:1px 4px;border-radius:3px">📋</span>' : '')
        + (r.cinsiyet ? '<span class="card-gender ' + rGenderClass + '">' + r.cinsiyet + '</span>' : '')
        + '</div>'
        + (r.not ? '<div class="card-note">📝 ' + r.not + '</div>' : '')
        + '</div></div>';
      body.appendChild(card);
    });
  });
}

  overlay.innerHTML = `
    <div style="background:#181c27;border:1px solid #2a3050;border-radius:16px;padding:32px;max-width:360px;width:90%;text-align:center">
      <div style="font-size:2rem;margin-bottom:10px">📅</div>
      <h2 style="color:#e8ecf5;font-size:1.1rem;margin-bottom:8px">Dış Randevu Sistemi</h2>
      <p style="color:#8892b0;font-size:0.85rem;margin-bottom:24px">Çalışma modunu seçin</p>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button onclick="document.getElementById('initial-overlay').remove();initDrive()"
          style="background:#4f8ef7;color:#fff;border:none;border-radius:10px;padding:14px;font-size:0.95rem;font-weight:600;cursor:pointer">
          ☁ Drive ile Senkronize Et
        </button>
        <button onclick="initDrive(true)"
          style="background:transparent;color:#4f8ef7;border:1px solid #4f8ef7;border-radius:10px;padding:8px;font-size:0.85rem;cursor:pointer">
          Hesap Seç / Değiştir
        </button>
        <button onclick="document.getElementById('initial-overlay').remove();startLocalMode()"
          style="background:#1e2336;color:#8892b0;border:1px solid #2a3050;border-radius:10px;padding:14px;font-size:0.95rem;cursor:pointer">
          💾 Lokal Çalış
          <div style="font-size:0.75rem;opacity:.7;margin-top:2px">İnternet bağlantısı yokken kullanılır</div>
        </button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function startLocalMode() {
  isLocalMode = true;
  randevuSifreHash = localStorage.getItem('rheum_outer_pw');
  if (!randevuSifreHash) {
    showToast('⚠ Lütfen önce internet var iken Drive ile bir kez giriş yaparak sistemi kurun!', 'error', 6000);
    return;
  }
  document.getElementById('drive-connect-btn').textContent = '💾 Lokal Mod';
  showLoginModal();
}

window.onload = () => {
  showInitialModal();
};
