<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Randevu / Taburcu Girişi</title>
<style>
:root {
  --bg:#0d1117;--surface:#161b27;--surface2:#1e2336;
  --border:#2a3050;--text:#e8ecf5;--text2:#8892b0;
  --accent:#4f8ef7;--accent2:#7c6af7;--success:#4ff79e;
  --warn:#f7a74f;--danger:#f74f4f;--male:#4f8ef7;--female:#f76fa8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.topbar h1{font-size:0.95rem;font-weight:700}
.btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:0.82rem}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.container{max-width:800px;margin:20px auto;padding:0 14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
.card h2{font-size:0.88rem;color:var(--text2);margin-bottom:14px;font-weight:600}
.field-group{margin-bottom:10px}
.field-label{font-size:0.78rem;color:var(--text2);margin-bottom:3px;display:block}
.field-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:8px;font-size:0.86rem}
.field-input:focus{outline:none;border-color:var(--accent)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.week-nav button{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:6px;cursor:pointer}
.week-nav span{font-size:0.85rem;font-weight:600;flex:1;text-align:center}
.day-row{border:1px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden}
.day-header{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;background:var(--surface2)}
.day-header:hover{background:rgba(79,142,247,.08)}
.day-header.today{border-left:3px solid var(--accent2)}
.day-label{font-size:0.82rem;font-weight:600;width:90px;color:var(--text)}
.day-badges{display:flex;gap:6px;align-items:center;flex:1;flex-wrap:wrap}
.badge{display:inline-block;font-size:0.68rem;font-weight:700;border-radius:6px;padding:2px 7px}
.badge-blue{background:rgba(79,142,247,.15);color:var(--accent)}
.badge-warn{background:rgba(247,167,79,.15);color:var(--warn)}
.badge-success{background:rgba(79,247,158,.15);color:var(--success)}
.day-cards{display:none;padding:8px 10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.r-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.r-card-info{flex:1}
.r-card-name{font-size:0.84rem;font-weight:600;color:var(--text)}
.r-card-meta{font-size:0.74rem;color:var(--text2);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.r-card-pending{border-color:var(--warn);background:rgba(247,167,79,.07)}
.add-btn{margin-left:auto;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:3px 10px;cursor:pointer;font-size:0.75rem;white-space:nowrap}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:520px;width:92%;max-height:90vh;overflow-y:auto;padding:22px}
.modal h3{font-size:0.95rem;margin-bottom:14px}
.toast{position:fixed;top:16px;right:16px;background:var(--surface);border:1px solid var(--success);border-radius:10px;padding:10px 16px;font-size:0.83rem;z-index:999}
.toast.error{border-color:var(--danger)}
</style>
</head>
<body>

<!-- BAŞLANGIÇ / YÜKLEME -->
<div id="loading-screen" style="position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px">
  <div style="font-size:2rem">📅</div>
  <div style="font-size:1rem;font-weight:700;color:var(--text)">Randevu / Taburcu Girişi</div>
  <div id="loading-msg" style="font-size:0.85rem;color:var(--text2)">Drive bağlanıyor...</div>
</div>

<!-- ŞIFRE EKRANI -->
<div id="sifre-screen" style="position:fixed;inset:0;background:var(--bg);z-index:998;display:none;align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:360px;width:90%;text-align:center">
    <div style="font-size:2rem;margin-bottom:10px">🔐</div>
    <h2 style="font-size:1rem;margin-bottom:6px">Randevu Sistemi</h2>
    <p style="color:var(--text2);font-size:0.82rem;margin-bottom:20px">Sisteme erişmek için şifre girin</p>
    <input type="password" id="sifre-input" placeholder="Şifre" autofocus
      style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:11px;border-radius:10px;font-size:0.95rem;margin-bottom:10px;box-sizing:border-box">
    <button onclick="sifreGiris()" style="width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px;font-size:0.92rem;cursor:pointer;margin-bottom:8px">Giriş</button>
    <div id="sifre-hata" style="color:var(--danger);font-size:0.8rem;margin-bottom:8px"></div>
    <div id="sifre-yeni-alan" style="display:none">
      <p style="color:var(--text2);font-size:0.8rem;margin-bottom:8px">İlk kez: Yeni şifre oluşturun</p>
      <input type="password" id="sifre-y1" placeholder="Yeni şifre" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px;border-radius:8px;font-size:0.88rem;margin-bottom:6px;box-sizing:border-box">
      <input type="password" id="sifre-y2" placeholder="Tekrar" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px;border-radius:8px;font-size:0.88rem;margin-bottom:8px;box-sizing:border-box">
      <button onclick="sifreOlustur()" style="width:100%;background:var(--success);color:#0d1117;border:none;border-radius:8px;padding:9px;cursor:pointer;font-weight:700">Şifre Oluştur</button>
    </div>
  </div>
</div>

<!-- ANA EKRAN -->
<div class="topbar">
  <span>📅</span>
  <h1>Randevu / Taburcu Girişi</h1>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
    <button id="sync-btn" class="btn" onclick="syncRandevular()" style="display:none">🔄 Güncelle</button>
    <button id="drive-status-btn" class="btn" style="color:var(--text2);pointer-events:none">☁ Bağlanıyor...</button>
    <button class="btn" onclick="openSifreDegistir()" title="Şifre Değiştir" style="display:none" id="sifre-btn">🔐</button>
  </div>
</div>

<div class="container" id="main-container" style="display:none">
  <!-- HAFTALIK TAKVİM -->
  <div class="card">
    <div class="week-nav">
      <button onclick="changeWeek(-1)">◀</button>
      <span id="week-label"></span>
      <button onclick="changeWeek(1)">▶</button>
    </div>
    <div id="week-days"></div>
  </div>
</div>

<!-- RANDEVU FORM MODAL -->
<div class="modal-overlay" id="randevu-modal">
  <div class="modal">
    <h3>📅 <span id="modal-tarih-baslik"></span></h3>
    <div class="row2">
      <div class="field-group">
        <label class="field-label">Hasta Adı *</label>
        <input type="text" id="r-hasta-adi" class="field-input" placeholder="Ad Soyad">
      </div>
      <div class="field-group">
        <label class="field-label">TC Kimlik</label>
        <input type="text" id="r-tc" class="field-input" placeholder="11 hane" maxlength="11" pattern="\d{11}" inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'')">
      </div>
    </div>
    <div class="row2">
      <div class="field-group">
        <label class="field-label">Yaş</label>
        <input type="number" id="r-yas" class="field-input" placeholder="Yaş">
      </div>
      <div class="field-group">
        <label class="field-label">Cinsiyet</label>
        <select id="r-cinsiyet" class="field-input">
          <option value="">Seçin</option><option>Erkek</option><option>Kadın</option>
        </select>
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">Telefon</label>
      <div id="telefon-container">
        <div class="telefon-row" style="display:flex;gap:6px;margin-bottom:6px">
          <input type="tel" class="field-input tel-numara" placeholder="05xx xxx xx xx" style="flex:2">
          <input type="text" class="field-input tel-kimin" placeholder="Kimin? (Hasta, Anne...)" style="flex:2">
          <button onclick="telEkle()" style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;white-space:nowrap">+</button>
        </div>
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">Randevu Nedeni *</label>
      <select id="r-neden" class="field-input" onchange="nedenDegisti(this.value)">
        <option value="">Seçin</option>
        <option>Tanı/Tedavi</option>
        <option>İlaç Eğitimi</option>
        <option>İlaç Uygulaması</option>
        <option>Diğer</option>
      </select>
    </div>
    <!-- Tanı/Tedavi + Diğer için ek alanlar -->
    <div id="r-tani-alani" style="display:none">
      <div class="field-group">
        <label class="field-label">Ön Tanı</label>
        <input type="text" id="r-tani" class="field-input" placeholder="Tanı">
      </div>
      <div class="field-group">
        <label class="field-label">Tedavi Planı</label>
        <textarea id="r-tedavi-plani" rows="3" class="field-input" style="resize:vertical" placeholder="Tedavi planı..."></textarea>
      </div>
    </div>
    <!-- Diğer neden alanı -->
    <div id="r-diger-alani" style="display:none">
      <div class="field-group">
        <label class="field-label">Yatış Nedeni</label>
        <input type="text" id="r-diger-neden" class="field-input" placeholder="Yatış nedeni">
      </div>
      <div class="field-group">
        <label class="field-label">Plan</label>
        <textarea id="r-diger-plan" rows="3" class="field-input" style="resize:vertical" placeholder="Plan..."></textarea>
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">İlaç Adı</label>
      <input type="text" id="r-ilac" class="field-input" placeholder="Varsa ilaç adı">
    </div>
    <div style="display:flex;gap:16px;margin-bottom:10px">
      <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:0.85rem">
        <input type="checkbox" id="r-rapor"> 📄 Rapor var
      </label>
      <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:0.85rem">
        <input type="checkbox" id="r-form"> 📋 Form var
      </label>
    </div>
    <div class="field-group">
      <label class="field-label">Not</label>
      <textarea id="r-not" rows="2" class="field-input" style="resize:vertical" placeholder="Ek not..."></textarea>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-primary" onclick="saveRandevuGiris()">💾 Kaydet</button>
      <button class="btn" onclick="document.getElementById('randevu-modal').style.display='none'">İptal</button>
    </div>
  </div>
</div>

<script>
const DRIVE_CLIENT_ID = '760070734433-ho3s6vo856qf06gtfpo5d7tou5npk33l.apps.googleusercontent.com';
const DRIVE_FOLDER_ID = '1WwjCPb3GIsPmgoFWiqnuA1R6BZlp-zPS';
const SIFRE_FILE = 'rheum_randevu_config.json';
const PENDING_FILE = 'rheum_randevu_pending.json';

let driveAccessToken = null;
let sifreHash = null;
let randevular = []; // Drive'dan çekilen onaylı randevular
let pendingRandevular = []; // Onay bekleyenler (bu sayfadan eklenip henüz onaylanmamış)
let secilenTarih = null;
let currentWeekOffset = 0;
let tokenClient = null;

// ── SHA-256 ──
async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── LOADING SCREEN ──
function setLoading(msg) {
  document.getElementById('loading-msg').textContent = msg;
}
function hideLoading() {
  document.getElementById('loading-screen').style.display = 'none';
}
function showSifre() {
  document.getElementById('sifre-screen').style.display = 'flex';
  setTimeout(() => document.getElementById('sifre-input').focus(), 100);
}
function showMain() {
  document.getElementById('main-container').style.display = 'block';
  document.getElementById('sync-btn').style.display = 'inline-block';
  document.getElementById('sifre-btn').style.display = 'inline-block';
  renderWeek();
}

// ── DRIVE ──
function initDrive() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: DRIVE_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/drive',
    callback: async (resp) => {
      if (resp.error) {
        setLoading('Drive bağlantı hatası: ' + resp.error);
        hideLoading();
        showSifre();
        return;
      }
      driveAccessToken = resp.access_token;
      localStorage.setItem('rheum_randevu_account', '1');
      const btn = document.getElementById('drive-status-btn');
      btn.textContent = '☁ Drive Bağlı';
      btn.style.color = 'var(--success)';

      // Şifre yükle
      setLoading('Şifre kontrol ediliyor...');
      await loadSifre();
      hideLoading();
      showSifre();
    }
  });

  setLoading('Google hesabı bağlanıyor...');
  tokenClient.requestAccessToken({ prompt: '' });
}

// ── ŞIFRE ──
async function loadSifre() {
  try {
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${SIFRE_FILE}' and '${DRIVE_FOLDER_ID}' in parents and trashed=false&fields=files(id)`,
      { headers: { Authorization: 'Bearer ' + driveAccessToken } }
    );
    const data = await res.json();
    if (data.files && data.files.length > 0) {
      const cr = await fetch(`https://www.googleapis.com/drive/v3/files/${data.files[0].id}?alt=media`,
        { headers: { Authorization: 'Bearer ' + driveAccessToken } });
      const cfg = await cr.json();
      sifreHash = cfg.sifrehash || null;
    }
  } catch(e) { console.warn('Şifre yüklenemedi:', e); }
}

async function saveSifre(hash) {
  const jsonStr = JSON.stringify({ sifrehash: hash });
  try {
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${SIFRE_FILE}' and '${DRIVE_FOLDER_ID}' in parents and trashed=false&fields=files(id)`,
      { headers: { Authorization: 'Bearer ' + driveAccessToken } }
    );
    const data = await res.json();
    const form = new FormData();
    if (data.files && data.files.length > 0) {
      form.append('metadata', new Blob([JSON.stringify({name:SIFRE_FILE})], {type:'application/json'}));
      form.append('file', new Blob([jsonStr], {type:'application/json'}));
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${data.files[0].id}?uploadType=multipart`,
        { method:'PATCH', headers:{Authorization:'Bearer '+driveAccessToken}, body:form });
    } else {
      form.append('metadata', new Blob([JSON.stringify({name:SIFRE_FILE,parents:[DRIVE_FOLDER_ID]})], {type:'application/json'}));
      form.append('file', new Blob([jsonStr], {type:'application/json'}));
      await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
        { method:'POST', headers:{Authorization:'Bearer '+driveAccessToken}, body:form });
    }
    sifreHash = hash;
  } catch(e) { console.warn('Şifre kaydedilemedi:', e); }
}

async function sifreGiris() {
  const input = document.getElementById('sifre-input');
  const hata = document.getElementById('sifre-hata');
  if (!input.value) { hata.textContent = '❌ Şifre boş'; return; }
  if (!sifreHash) {
    document.getElementById('sifre-yeni-alan').style.display = 'block';
    hata.textContent = 'Henüz şifre yok, oluşturun';
    return;
  }
  const hash = await sha256(input.value);
  if (hash === sifreHash) {
    document.getElementById('sifre-screen').style.display = 'none';
    setLoading('Randevular yükleniyor...');
    document.getElementById('loading-screen').style.display = 'flex';
    await syncRandevular();
    hideLoading();
    showMain();
  } else {
    hata.textContent = '❌ Yanlış şifre';
    input.value = '';
    input.focus();
  }
}

async function sifreOlustur() {
  const p1 = document.getElementById('sifre-y1').value;
  const p2 = document.getElementById('sifre-y2').value;
  const hata = document.getElementById('sifre-hata');
  if (!p1) { hata.textContent = '❌ Şifre boş'; return; }
  if (p1 !== p2) { hata.textContent = '❌ Şifreler eşleşmiyor'; return; }
  if (p1.length < 4) { hata.textContent = '❌ En az 4 karakter'; return; }
  const hash = await sha256(p1);
  await saveSifre(hash);
  document.getElementById('sifre-screen').style.display = 'none';
  setLoading('Randevular yükleniyor...');
  document.getElementById('loading-screen').style.display = 'flex';
  await syncRandevular();
  hideLoading();
  showMain();
  showToast('✅ Şifre oluşturuldu');
}

function openSifreDegistir() {
  const div = document.createElement('div');
  div.id = 'sd-overlay';
  div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center';
  div.innerHTML = `<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:340px;width:90%;text-align:center">
    <div style="font-size:1.5rem;margin-bottom:10px">🔐</div>
    <h3 style="font-size:0.95rem;margin-bottom:14px">Randevu Şifresi Değiştir</h3>
    <input type="password" id="sd-eski" placeholder="Mevcut şifre" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px;border-radius:8px;font-size:0.88rem;margin-bottom:6px;box-sizing:border-box">
    <input type="password" id="sd-y1" placeholder="Yeni şifre" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px;border-radius:8px;font-size:0.88rem;margin-bottom:6px;box-sizing:border-box">
    <input type="password" id="sd-y2" placeholder="Tekrar" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px;border-radius:8px;font-size:0.88rem;margin-bottom:10px;box-sizing:border-box">
    <div style="display:flex;gap:8px">
      <button onclick="sifreDegistir()" style="flex:1;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px;cursor:pointer">Değiştir</button>
      <button onclick="document.getElementById('sd-overlay').remove()" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:9px;cursor:pointer">İptal</button>
    </div>
    <div id="sd-hata" style="color:var(--danger);font-size:0.78rem;margin-top:8px"></div>
  </div>`;
  document.body.appendChild(div);
}

async function sifreDegistir() {
  const eski = document.getElementById('sd-eski').value;
  const p1 = document.getElementById('sd-y1').value;
  const p2 = document.getElementById('sd-y2').value;
  const hata = document.getElementById('sd-hata');
  if (await sha256(eski) !== sifreHash) { hata.textContent = '❌ Mevcut şifre yanlış'; return; }
  if (!p1 || p1 !== p2) { hata.textContent = p1 ? '❌ Şifreler eşleşmiyor' : '❌ Şifre boş'; return; }
  if (p1.length < 4) { hata.textContent = '❌ En az 4 karakter'; return; }
  await saveSifre(await sha256(p1));
  document.getElementById('sd-overlay').remove();
  showToast('✅ Şifre değiştirildi');
}

// ── SYNC ──
async function syncRandevular() {
  if (!driveAccessToken) return;
  try {
    // 1. Drive'dan onaylı randevuları çek (durum dosyasından)
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q='${DRIVE_FOLDER_ID}' in parents and name contains 'rheum_durum_' and mimeType='application/json' and trashed=false&fields=files(id,modifiedTime)&orderBy=modifiedTime desc&pageSize=1`,
      { headers: { Authorization: 'Bearer ' + driveAccessToken } }
    );
    const data = await res.json();
    if (data.files && data.files.length > 0) {
      const cr = await fetch(`https://www.googleapis.com/drive/v3/files/${data.files[0].id}?alt=media`,
        { headers: { Authorization: 'Bearer ' + driveAccessToken } });
      const durum = await cr.json();
      randevular = durum.randevular || [];
    }

    // 2. Pending (onay bekleyen) listesini çek
    const pRes = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${PENDING_FILE}' and '${DRIVE_FOLDER_ID}' in parents and trashed=false&fields=files(id)`,
      { headers: { Authorization: 'Bearer ' + driveAccessToken } }
    );
    const pData = await pRes.json();
    if (pData.files && pData.files.length > 0) {
      const cr = await fetch(`https://www.googleapis.com/drive/v3/files/${pData.files[0].id}?alt=media`,
        { headers: { Authorization: 'Bearer ' + driveAccessToken } });
      pendingRandevular = await cr.json();
    }

    localStorage.setItem('rheum_randevu_cache', JSON.stringify({randevular, pendingRandevular}));
    showToast('✅ Güncellendi');
    renderWeek();
  } catch(e) { showToast('❌ Güncelleme hatası', 'error'); }
}

// ── RANDEVU KAYDET ──
function telEkle() {
  const container = document.getElementById('telefon-container');
   const row = document.createElement('div');
   row.className = 'telefon-row';
   row.style.cssText = 'display:flex;gap:6px;margin-bottom:6px';
   const tel2 = document.createElement('input'); tel2.type='tel'; tel2.className='field-input tel-numara'; tel2.placeholder='05xx xxx xx xx'; tel2.style.flex='2';
   tel2.addEventListener('input', () => { tel2.value = tel2.value.replace(/[^0-9+]/g, ''); });
   const kim2 = document.createElement('input'); kim2.type='text'; kim2.className='field-input tel-kimin'; kim2.placeholder='Kimin?'; kim2.style.flex='2';
   const sil2 = document.createElement('button'); sil2.textContent='✕';
   sil2.style.cssText='background:var(--danger);color:#fff;border:none;border-radius:8px;padding:6px 10px;cursor:pointer';
   sil2.onclick = () => row.remove();
   row.appendChild(tel2); row.appendChild(kim2); row.appendChild(sil2);
}

function getTelefonlar() {
  const rows = document.querySelectorAll('.telefon-row');
  const result = [];
  rows.forEach(row => {
    const numara = row.querySelector('.tel-numara')?.value.trim();
    const kimin = row.querySelector('.tel-kimin')?.value.trim();
    if (numara) result.push({ numara, kimin: kimin || 'Hasta' });
  });
  return result;
}

function clearTelefonlar() {
  const container = document.getElementById('telefon-container');
  if (!container) return;
  // Sadece ilk satırı temizle, ekstraları sil
  const rows = container.querySelectorAll('.telefon-row');
  rows.forEach((row, i) => {
    if (i === 0) {
      row.querySelector('.tel-numara').value = '';
      row.querySelector('.tel-kimin').value = '';
    } else {
      row.remove();
    }
  });
}

function nedenDegisti(val) {
  const taniAlani = document.getElementById('r-tani-alani');
  const digerAlani = document.getElementById('r-diger-alani');
  if (taniAlani) taniAlani.style.display = val === 'Tanı/Tedavi' ? 'block' : 'none';
  if (digerAlani) digerAlani.style.display = val === 'Diğer' ? 'block' : 'none';
}

async function saveRandevuGiris() {
  const hastaAdi = document.getElementById('r-hasta-adi').value.trim();
  const neden = document.getElementById('r-neden').value;
  const tc = document.getElementById('r-tc').value.trim();
  if (!hastaAdi) { showToast('❌ Hasta adı gerekli', 'error'); return; }
  if (!neden) { showToast('❌ Randevu nedeni seçin', 'error'); return; }
  if (!secilenTarih) { showToast('❌ Tarih seçin', 'error'); return; }
  if (tc && !/^\d{11}$/.test(tc)) { showToast('❌ TC Kimlik 11 hane olmalı', 'error'); return; }

  const yeni = {
    id: 'rg_' + Date.now(),
    hastaAdi,
    tcKimlik: document.getElementById('r-tc').value.trim(),
    hastaYasi: document.getElementById('r-yas').value.trim(),
    cinsiyet: document.getElementById('r-cinsiyet').value,
    telefonlar: getTelefonlar(),
    tarih: secilenTarih,
    neden: neden === 'Diğer' ? (document.getElementById('r-diger-neden').value.trim() || 'Diğer') : neden,
    plan: neden === 'Diğer' ? (document.getElementById('r-diger-plan')?.value.trim() || '') : '',
    taniTedaviPlani: (neden === 'Tanı/Tedavi' || neden === 'Diğer') ? document.getElementById('r-tedavi-plani')?.value.trim() : '',
    tani: neden === 'Tanı/Tedavi' ? document.getElementById('r-tani')?.value.trim() : '',
    ilacAdi: document.getElementById('r-ilac').value.trim(),
    rapor: document.getElementById('r-rapor').checked,
    form: document.getElementById('r-form').checked,
    not: document.getElementById('r-not').value.trim(),
    yatti: false,
    kaynak: 'randevu_giris',
    eklenmeTarihi: new Date().toISOString()
  };

  // Önce Drive'dan güncel pending listesini çek (onay/silme işlemleri yapılmış olabilir)
  await syncPendingFromDrive();

  // Lokale pending'e ekle
  pendingRandevular.push(yeni);
  localStorage.setItem('rheum_randevu_cache', JSON.stringify({randevular, pendingRandevular}));

  // Drive'a pending dosyasına kaydet
  await savePendingDrive();

  // Formu kapat ve temizle
  document.getElementById('randevu-modal').style.display = 'none';
  clearTelefonlar();
  ['r-hasta-adi','r-tc','r-yas','r-ilac','r-not','r-tani','r-tedavi-plani','r-diger-neden','r-diger-plan'].forEach(id => {
    const el = document.getElementById(id); if(el) el.value = '';
  });
  document.getElementById('r-cinsiyet').value = '';
  document.getElementById('r-neden').value = '';
  document.getElementById('r-rapor').checked = false;
  document.getElementById('r-form').checked = false;
  nedenDegisti('');

  showToast('✅ ' + hastaAdi + ' — değerlendirme onayı bekliyor');
  renderWeek();
}

async function syncPendingFromDrive() {
  // Pending listesini Drive'dan çek — onaylanmış/silinmiş olanları temizle
  if (!driveAccessToken) return;
  try {
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${PENDING_FILE}' and '${DRIVE_FOLDER_ID}' in parents and trashed=false&fields=files(id)`,
      { headers: { Authorization: 'Bearer ' + driveAccessToken } }
    );
    const data = await res.json();
    if (data.files && data.files.length > 0) {
      const cr = await fetch(`https://www.googleapis.com/drive/v3/files/${data.files[0].id}?alt=media`,
        { headers: { Authorization: 'Bearer ' + driveAccessToken } });
      const latest = await cr.json();
      if (Array.isArray(latest)) {
        pendingRandevular = latest;
        localStorage.setItem('rheum_randevu_cache', JSON.stringify({randevular, pendingRandevular}));
        renderWeek();
      }
    }
  } catch(e) { console.warn('Pending sync hatası:', e); }
}

async function savePendingDrive() {
  if (!driveAccessToken) return;
  try {
    const jsonStr = JSON.stringify(pendingRandevular);
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${PENDING_FILE}' and '${DRIVE_FOLDER_ID}' in parents and trashed=false&fields=files(id)`,
      { headers: { Authorization: 'Bearer ' + driveAccessToken } }
    );
    const data = await res.json();
    const form = new FormData();
    if (data.files && data.files.length > 0) {
      form.append('metadata', new Blob([JSON.stringify({name:PENDING_FILE})], {type:'application/json'}));
      form.append('file', new Blob([jsonStr], {type:'application/json'}));
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${data.files[0].id}?uploadType=multipart`,
        { method:'PATCH', headers:{Authorization:'Bearer '+driveAccessToken}, body:form });
    } else {
      form.append('metadata', new Blob([JSON.stringify({name:PENDING_FILE,parents:[DRIVE_FOLDER_ID]})], {type:'application/json'}));
      form.append('file', new Blob([jsonStr], {type:'application/json'}));
      await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
        { method:'POST', headers:{Authorization:'Bearer '+driveAccessToken}, body:form });
    }
  } catch(e) { console.warn('Pending kayıt hatası:', e); }
}

// ── TAKVİM ──
function localDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function getWeekStart() {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day===0?6:day-1) + currentWeekOffset*7);
  mon.setHours(0,0,0,0);
  return mon;
}
const DAYS = ['Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi','Pazar'];

function renderWeek() {
  const ws = getWeekStart();
  const we = new Date(ws); we.setDate(ws.getDate()+6);
  document.getElementById('week-label').textContent =
    ws.toLocaleDateString('tr-TR',{day:'numeric',month:'long'}) + ' — ' +
    we.toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'});

  const today = localDate(new Date());
  const container = document.getElementById('week-days');
  container.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate()+i);
    const ds = localDate(d);
    const dayRans = randevular.filter(r => r.tarih === ds && !r.yatti);
    const dayPending = pendingRandevular.filter(r => r.tarih === ds);
    const isToday = ds === today;

    const row = document.createElement('div');
    row.className = 'day-row';

    // Header
    const header = document.createElement('div');
    header.className = 'day-header' + (isToday ? ' today' : '');
    
    let badgesHtml = '';
    if (dayRans.length > 0) badgesHtml += `<span class="badge badge-blue">${dayRans.length} randevu</span>`;
    if (dayPending.length > 0) badgesHtml += `<span class="badge badge-warn">${dayPending.length} onay bekliyor</span>`;
    if (dayRans.length === 0 && dayPending.length === 0) badgesHtml = '<span style="font-size:0.72rem;color:var(--text2)">Randevu yok</span>';

    // Names
    const allNames = [...dayRans.map(r=>r.hastaAdi), ...dayPending.map(r=>'⏳'+r.hastaAdi)].join(', ');

    header.innerHTML = `
      <div class="day-label">${DAYS[i]} ${d.getDate()}</div>
      <div class="day-badges">${badgesHtml}${allNames ? '<span style="font-size:0.72rem;color:var(--accent);margin-left:4px">'+allNames+'</span>' : ''}</div>
      <button onclick="openRandevuModal('${ds}',event)" class="add-btn">+ Ekle</button>`;

    // Cards area
    const cards = document.createElement('div');
    cards.className = 'day-cards';
    cards.id = 'cards-' + ds;
    cards.style.display = 'none';

    // Onaylı randevular
    dayRans.forEach(r => {
      const gColor = r.cinsiyet === 'Erkek' ? 'var(--male)' : r.cinsiyet === 'Kadın' ? 'var(--female)' : 'var(--text2)';
      const card = document.createElement('div');
      card.className = 'r-card';
      card.innerHTML = `
        <div class="r-card-info">
          <div class="r-card-name">${r.hastaAdi}</div>
          <div class="r-card-meta">
            ${r.hastaYasi ? '<span>'+r.hastaYasi+' yaş</span>' : ''}
            ${r.cinsiyet ? '<span style="color:'+gColor+'">'+r.cinsiyet+'</span>' : ''}
            <span style="color:var(--accent2)">${r.neden||''}</span>
            ${r.ilacAdi ? '<span>💊 '+r.ilacAdi+(r.ilacDozu?' '+r.ilacDozu:'')+'</span>' : ''}
            ${r.rapor ? '<span title="Rapor var">📄</span>' : ''}
            ${r.form ? '<span title="Form var">📋</span>' : ''}
          </div>
          ${r.not ? '<div style="font-size:0.72rem;color:var(--text2);margin-top:3px">📝 '+r.not+'</div>' : ''}
        </div>
        <span class="badge badge-success">✓ Onaylı</span>`;
      cards.appendChild(card);
    });

    // Onay bekleyen randevular
    dayPending.forEach(r => {
      const gColor = r.cinsiyet === 'Erkek' ? 'var(--male)' : r.cinsiyet === 'Kadın' ? 'var(--female)' : 'var(--text2)';
      const card = document.createElement('div');
      card.className = 'r-card r-card-pending';
      card.innerHTML = `
        <div class="r-card-info">
          <div class="r-card-name">⏳ ${r.hastaAdi}</div>
          <div class="r-card-meta">
            ${r.hastaYasi ? '<span>'+r.hastaYasi+' yaş</span>' : ''}
            ${r.cinsiyet ? '<span style="color:'+gColor+'">'+r.cinsiyet+'</span>' : ''}
            <span style="color:var(--accent2)">${r.neden||''}</span>
            ${r.ilacAdi ? '<span>💊 '+r.ilacAdi+'</span>' : ''}
          </div>
        </div>
        <span class="badge badge-warn">⏳ Onay bekliyor</span>`;
      cards.appendChild(card);
    });

    if (dayRans.length > 0 || dayPending.length > 0) {
      header.style.cursor = 'pointer';
      header.addEventListener('click', (e) => {
        if (e.target.classList.contains('add-btn') || e.target.closest('.add-btn')) return;
        const c = document.getElementById('cards-' + ds);
        c.style.display = c.style.display === 'none' ? 'flex' : 'none';
        c.style.flexDirection = 'column';
      });
    }

    row.appendChild(header);
    if (dayRans.length > 0 || dayPending.length > 0) row.appendChild(cards);
    container.appendChild(row);
  }
}

function changeWeek(dir) { currentWeekOffset += dir; renderWeek(); }

function openRandevuModal(dateStr, e) {
  if (e) e.stopPropagation();
  secilenTarih = dateStr;
  const d = new Date(dateStr + 'T00:00:00');
  document.getElementById('modal-tarih-baslik').textContent =
    d.toLocaleDateString('tr-TR', {weekday:'long', day:'numeric', month:'long'});
  document.getElementById('randevu-modal').style.display = 'flex';
}

// ── TOAST ──
function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast' + (type === 'error' ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// ── INIT ──
document.getElementById('sifre-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sifreGiris();
});

// GSI yüklenince Drive başlat
window.addEventListener('load', () => {
  // İlk telefon satırına oninput ekle
  const firstTel = document.querySelector('.tel-numara');
  if (firstTel) firstTel.addEventListener('input', () => { firstTel.value = firstTel.value.replace(/[^0-9+]/g, ''); });
  // Lokal cache varsa göster
  const cache = localStorage.getItem('rheum_randevu_cache');
  if (cache) {
    try {
      const c = JSON.parse(cache);
      randevular = c.randevular || [];
      pendingRandevular = c.pendingRandevular || [];
    } catch(e) {}
  }

  setTimeout(() => {
    try { initDrive(); } catch(e) {
      setLoading('Drive yüklenemedi. Sayfayı yenileyin.');
    }
  }, 800);
});
