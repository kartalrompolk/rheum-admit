<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Randevu / Taburcu Girişi</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b27; --surface2: #1e2336;
  --border: #2a3050; --text: #e8ecf5; --text2: #8892b0;
  --accent: #4f8ef7; --accent2: #7c6af7; --success: #4ff79e;
  --warn: #f7a74f; --danger: #f74f4f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
.topbar h1 { font-size: 0.95rem; font-weight: 700; color: var(--text); }
.btn { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); cursor: pointer; font-size: 0.82rem; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.container { max-width: 700px; margin: 24px auto; padding: 0 16px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.card h2 { font-size: 0.9rem; color: var(--text2); margin-bottom: 16px; font-weight: 600; }
.field-group { margin-bottom: 12px; }
.field-label { font-size: 0.8rem; color: var(--text2); margin-bottom: 4px; display: block; }
.field-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; border-radius: 8px; font-size: 0.88rem; }
.field-input:focus { outline: none; border-color: var(--accent); }
select.field-input { cursor: pointer; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.week-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.week-nav button { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 4px 10px; border-radius: 6px; cursor: pointer; }
.week-nav span { font-size: 0.85rem; color: var(--text); font-weight: 600; flex: 1; text-align: center; }
.day-row { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; margin-bottom: 4px; }
.day-row:hover { background: var(--surface2); }
.day-row.selected { border-color: var(--accent); background: rgba(79,142,247,.1); }
.day-row.today { border-color: var(--accent2); }
.day-label { font-size: 0.82rem; font-weight: 600; width: 80px; color: var(--text); }
.day-count { font-size: 0.75rem; color: var(--text2); }
.day-names { font-size: 0.72rem; color: var(--accent); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 100; display: none; align-items: center; justify-content: center; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; padding: 24px; }
.modal h3 { font-size: 1rem; margin-bottom: 16px; }
.toast { position: fixed; top: 16px; right: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; font-size: 0.85rem; z-index: 999; animation: fadeIn .2s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } }
.badge { display: inline-block; font-size: 0.65rem; font-weight: 700; border-radius: 8px; padding: 1px 6px; }
.badge-warn { background: rgba(247,167,79,.2); color: var(--warn); }
</style>
</head>
<body>

<!-- ŞIFRE MODAL -->
<div class="modal-overlay" id="sifre-overlay" style="display:flex">
  <div style="background:#181c27;border:1px solid #2a3050;border-radius:16px;padding:32px;max-width:360px;width:90%;text-align:center">
    <div style="font-size:2rem;margin-bottom:10px">📅</div>
    <h2 style="color:#e8ecf5;font-size:1rem;margin-bottom:6px">Randevu Sistemi</h2>
    <p style="color:#8892b0;font-size:0.82rem;margin-bottom:20px">Sisteme erişmek için şifre girin</p>
    <input type="password" id="sifre-input" placeholder="Şifre" autofocus
      style="width:100%;background:#1e2336;border:1px solid #2a3050;color:#e8ecf5;padding:12px;border-radius:10px;font-size:1rem;margin-bottom:12px;box-sizing:border-box">
    <button onclick="sifreGiris()" style="width:100%;background:#4f8ef7;color:#fff;border:none;border-radius:10px;padding:12px;font-size:0.95rem;cursor:pointer;margin-bottom:8px">Giriş</button>
    <div id="sifre-hata" style="color:#f74f4f;font-size:0.8rem;margin-top:4px"></div>
    <div id="sifre-yoksa" style="display:none;margin-top:12px">
      <p style="color:#8892b0;font-size:0.8rem;margin-bottom:8px">İlk kez: Yeni şifre oluşturun</p>
      <input type="password" id="sifre-yeni1" placeholder="Yeni şifre" style="width:100%;background:#1e2336;border:1px solid #2a3050;color:#e8ecf5;padding:10px;border-radius:8px;font-size:0.9rem;margin-bottom:6px;box-sizing:border-box">
      <input type="password" id="sifre-yeni2" placeholder="Tekrar" style="width:100%;background:#1e2336;border:1px solid #2a3050;color:#e8ecf5;padding:10px;border-radius:8px;font-size:0.9rem;margin-bottom:8px;box-sizing:border-box">
      <button onclick="sifreOlustur()" style="width:100%;background:#4ff79e;color:#0d1117;border:none;border-radius:8px;padding:10px;cursor:pointer;font-weight:700">Şifre Oluştur</button>
    </div>
  </div>
</div>

<!-- RANDEVU EKLE MODAL -->
<div class="modal-overlay" id="randevu-modal">
  <div class="modal">
    <h3>📅 <span id="modal-tarih-baslik">Randevu Ekle</span></h3>
    <div id="randevu-modal-body"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary" onclick="saveRandevuGiris()">Kaydet</button>
      <button class="btn" onclick="document.getElementById('randevu-modal').style.display='none'">İptal</button>
    </div>
  </div>
</div>

<div class="topbar">
  <span>📅</span>
  <h1>Randevu / Taburcu Girişi</h1>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
    <button id="drive-btn" class="btn" onclick="connectDrive()">☁ Drive Bağlan</button>
    <button class="btn" onclick="openSifreDegistir()" title="Şifre Değiştir">🔐</button>
  </div>
</div>

<div class="container">
  <!-- HAFTALIK TAKVİM -->
  <div class="card">
    <div class="week-nav">
      <button onclick="changeWeek(-1)">◀</button>
      <span id="week-label"></span>
      <button onclick="changeWeek(1)">▶</button>
    </div>
    <div id="week-days"></div>
  </div>

  <!-- RANDEVU FORMU -->
  <div class="card" id="randevu-form-card" style="display:none">
    <h2>📝 <span id="form-tarih-label">Seçilen Tarih</span> — Randevu Ekle</h2>
    <div class="row2">
      <div class="field-group">
        <label class="field-label">Hasta Adı *</label>
        <input type="text" id="r-hasta-adi" class="field-input" placeholder="Ad Soyad">
      </div>
      <div class="field-group">
        <label class="field-label">TC Kimlik</label>
        <input type="text" id="r-tc" class="field-input" placeholder="11 hane">
      </div>
    </div>
    <div class="row2">
      <div class="field-group">
        <label class="field-label">Yaş</label>
        <input type="number" id="r-yas" class="field-input" placeholder="Yaş">
      </div>
      <div class="field-group">
        <label class="field-label">Cinsiyet</label>
        <select id="r-cinsiyet" class="field-input">
          <option value="">Seçin</option>
          <option>Erkek</option>
          <option>Kadın</option>
        </select>
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">Telefon</label>
      <input type="tel" id="r-telefon" class="field-input" placeholder="05xx xxx xx xx">
    </div>
    <div class="field-group">
      <label class="field-label">Randevu Nedeni *</label>
      <select id="r-neden" class="field-input">
        <option value="">Seçin</option>
        <option>Tanı/Tedavi</option>
        <option>İlaç Eğitimi</option>
        <option>İlaç Uygulaması</option>
        <option>Tükürük Bezi Biyopsisi</option>
        <option>Kontrol</option>
        <option>Diğer</option>
      </select>
    </div>
    <div class="field-group">
      <label class="field-label">İlaç Adı</label>
      <input type="text" id="r-ilac" class="field-input" placeholder="Varsa ilaç adı">
    </div>
    <div class="row2">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.88rem;padding:8px 0">
        <input type="checkbox" id="r-rapor"> 📄 Rapor var
      </label>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.88rem;padding:8px 0">
        <input type="checkbox" id="r-form"> 📋 Form var
      </label>
    </div>
    <div class="field-group">
      <label class="field-label">Not</label>
      <textarea id="r-not" rows="2" class="field-input" style="resize:vertical" placeholder="Ek not..."></textarea>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-primary" onclick="saveRandevuGiris()">💾 Kaydet</button>
      <button class="btn" onclick="document.getElementById('randevu-form-card').style.display='none'">İptal</button>
    </div>
  </div>
</div>

<script>
const DRIVE_CLIENT_ID = '760070734433-ho3s6vo856qf06gtfpo5d7tou5npk33l.apps.googleusercontent.com';
const DRIVE_FOLDER_ID = '1WwjCPb3GIsPmgoFWiqnuA1R6BZlp-zPS';
const RANDEVU_SIFRE_KEY = 'rheum_randevu_config.json'; // Ayrı şifre dosyası

let driveAccessToken = null;
let driveFolderId = DRIVE_FOLDER_ID;
let randevular = JSON.parse(localStorage.getItem('rheum_randevu_giris') || '[]');
let secilenTarih = null;
let currentWeekOffset = 0;
let sifreHash = null;

// ── SHA-256 ──
async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── ŞIFRE SİSTEMİ ──
async function loadSifre() {
  if (!driveAccessToken) return;
  try {
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${RANDEVU_SIFRE_KEY}' and '${driveFolderId}' in parents and trashed=false&fields=files(id)`,
      { headers: { Authorization: 'Bearer ' + driveAccessToken } }
    );
    const data = await res.json();
    if (data.files && data.files.length > 0) {
      const cr = await fetch(`https://www.googleapis.com/drive/v3/files/${data.files[0].id}?alt=media`,
        { headers: { Authorization: 'Bearer ' + driveAccessToken } });
      const cfg = await cr.json();
      sifreHash = cfg.sifrehash || null;
    }
  } catch(e) {}
}

async function saveSifre(hash) {
  if (!driveAccessToken) return;
  const jsonStr = JSON.stringify({ sifrehash: hash });
  try {
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${RANDEVU_SIFRE_KEY}' and '${driveFolderId}' in parents and trashed=false&fields=files(id)`,
      { headers: { Authorization: 'Bearer ' + driveAccessToken } }
    );
    const data = await res.json();
    const form = new FormData();
    if (data.files && data.files.length > 0) {
      form.append('metadata', new Blob([JSON.stringify({name:RANDEVU_SIFRE_KEY})], {type:'application/json'}));
      form.append('file', new Blob([jsonStr], {type:'application/json'}));
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${data.files[0].id}?uploadType=multipart`,
        { method: 'PATCH', headers: { Authorization: 'Bearer ' + driveAccessToken }, body: form });
    } else {
      form.append('metadata', new Blob([JSON.stringify({name:RANDEVU_SIFRE_KEY, parents:[driveFolderId]})], {type:'application/json'}));
      form.append('file', new Blob([jsonStr], {type:'application/json'}));
      await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
        { method: 'POST', headers: { Authorization: 'Bearer ' + driveAccessToken }, body: form });
    }
    sifreHash = hash;
  } catch(e) {}
}

async function sifreGiris() {
  const input = document.getElementById('sifre-input');
  const hata = document.getElementById('sifre-hata');
  if (!input.value) { hata.textContent = '❌ Şifre boş'; return; }
  if (!driveAccessToken) { hata.textContent = '⚠ Önce Drive bağlanın'; return; }
  if (!sifreHash) {
    document.getElementById('sifre-yoksa').style.display = 'block';
    hata.textContent = 'Henüz şifre yok, oluşturun';
    return;
  }
  const hash = await sha256(input.value);
  if (hash === sifreHash) {
    document.getElementById('sifre-overlay').style.display = 'none';
    loadRandevularDrive();
    showToast('✅ Giriş başarılı');
  } else {
    hata.textContent = '❌ Yanlış şifre';
    input.value = '';
    input.focus();
  }
}

async function sifreOlustur() {
  const p1 = document.getElementById('sifre-yeni1').value;
  const p2 = document.getElementById('sifre-yeni2').value;
  const hata = document.getElementById('sifre-hata');
  if (!p1) { hata.textContent = '❌ Şifre boş'; return; }
  if (p1 !== p2) { hata.textContent = '❌ Şifreler eşleşmiyor'; return; }
  if (p1.length < 4) { hata.textContent = '❌ En az 4 karakter'; return; }
  const hash = await sha256(p1);
  await saveSifre(hash);
  document.getElementById('sifre-overlay').style.display = 'none';
  loadRandevularDrive();
  showToast('✅ Şifre oluşturuldu, giriş yapıldı');
}

function openSifreDegistir() {
  const html = `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center" id="sd-overlay">
      <div style="background:#181c27;border:1px solid #2a3050;border-radius:16px;padding:28px;max-width:340px;width:90%;text-align:center">
        <div style="font-size:1.5rem;margin-bottom:10px">🔐</div>
        <h3 style="color:#e8ecf5;font-size:0.95rem;margin-bottom:16px">Randevu Şifresi Değiştir</h3>
        <input type="password" id="sd-eski" placeholder="Mevcut şifre" style="width:100%;background:#1e2336;border:1px solid #2a3050;color:#e8ecf5;padding:10px;border-radius:8px;font-size:0.9rem;margin-bottom:8px;box-sizing:border-box">
        <input type="password" id="sd-yeni1" placeholder="Yeni şifre" style="width:100%;background:#1e2336;border:1px solid #2a3050;color:#e8ecf5;padding:10px;border-radius:8px;font-size:0.9rem;margin-bottom:8px;box-sizing:border-box">
        <input type="password" id="sd-yeni2" placeholder="Yeni şifre tekrar" style="width:100%;background:#1e2336;border:1px solid #2a3050;color:#e8ecf5;padding:10px;border-radius:8px;font-size:0.9rem;margin-bottom:12px;box-sizing:border-box">
        <div style="display:flex;gap:8px">
          <button onclick="sifreDegistir()" style="flex:1;background:#4f8ef7;color:#fff;border:none;border-radius:8px;padding:10px;cursor:pointer">Değiştir</button>
          <button onclick="document.getElementById('sd-overlay').remove()" style="background:#1e2336;color:#8892b0;border:1px solid #2a3050;border-radius:8px;padding:10px;cursor:pointer">İptal</button>
        </div>
        <div id="sd-hata" style="color:#f74f4f;font-size:0.78rem;margin-top:8px"></div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

async function sifreDegistir() {
  const eski = document.getElementById('sd-eski').value;
  const p1 = document.getElementById('sd-yeni1').value;
  const p2 = document.getElementById('sd-yeni2').value;
  const hata = document.getElementById('sd-hata');
  const eskiHash = await sha256(eski);
  if (eskiHash !== sifreHash) { hata.textContent = '❌ Mevcut şifre yanlış'; return; }
  if (!p1) { hata.textContent = '❌ Yeni şifre boş'; return; }
  if (p1 !== p2) { hata.textContent = '❌ Şifreler eşleşmiyor'; return; }
  if (p1.length < 4) { hata.textContent = '❌ En az 4 karakter'; return; }
  const hash = await sha256(p1);
  await saveSifre(hash);
  document.getElementById('sd-overlay').remove();
  showToast('✅ Şifre değiştirildi');
}

// ── DRIVE ──
let tokenClient = null;

function initDrive() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: DRIVE_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/drive',
    callback: async (resp) => {
      if (resp.error) { showToast('❌ Drive bağlantı hatası: ' + resp.error, 'error'); return; }
      driveAccessToken = resp.access_token;
      const btn = document.getElementById('drive-btn');
      if (btn) { btn.textContent = '☁ Drive Bağlı'; btn.style.color = 'var(--success)'; btn.style.borderColor = 'var(--success)'; }
      localStorage.setItem('rheum_randevu_account', '1');
      // Şifre ekranından Drive bağlandıysa — şifreyi yükle
      await loadSifre();
      const hata = document.getElementById('sifre-hata');
      if (hata) hata.textContent = '';
      if (!sifreHash) {
        document.getElementById('sifre-yoksa').style.display = 'block';
        if (hata) hata.textContent = 'Henüz şifre yok, oluşturun';
      }
    }
  });
}

function connectDrive() {
  if (!tokenClient) { showToast('❌ Drive henüz yüklenmedi, bekleyin', 'error'); return; }
  tokenClient.requestAccessToken({ prompt: '' });
}

// ── RANDEVU YÜKLEME ──
async function loadRandevularDrive() {
  if (!driveAccessToken) return;
  try {
    // Degerlendirme'nin durum dosyasından randevular çek
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q='${driveFolderId}' in parents and name contains 'rheum_durum_' and mimeType='application/json' and trashed=false&fields=files(id,name,modifiedTime)&orderBy=modifiedTime desc&pageSize=1`,
      { headers: { Authorization: 'Bearer ' + driveAccessToken } }
    );
    const data = await res.json();
    if (data.files && data.files.length > 0) {
      const cr = await fetch(`https://www.googleapis.com/drive/v3/files/${data.files[0].id}?alt=media`,
        { headers: { Authorization: 'Bearer ' + driveAccessToken } });
      const durum = await cr.json();
      randevular = durum.randevular || [];
      localStorage.setItem('rheum_randevu_giris', JSON.stringify(randevular));
    }
  } catch(e) { console.warn('Randevu yükleme hatası:', e); }
  renderWeek();
}

// ── RANDEVU KAYDET ──
async function saveRandevuGiris() {
  const hastaAdi = document.getElementById('r-hasta-adi').value.trim();
  const neden = document.getElementById('r-neden').value;
  if (!hastaAdi) { showToast('❌ Hasta adı gerekli', 'error'); return; }
  if (!neden) { showToast('❌ Randevu nedeni seçin', 'error'); return; }
  if (!secilenTarih) { showToast('❌ Tarih seçin', 'error'); return; }

  const yeniRandevu = {
    id: 'rg_' + Date.now(),
    hastaAdi,
    tcKimlik: document.getElementById('r-tc').value.trim(),
    hastaYasi: document.getElementById('r-yas').value.trim(),
    cinsiyet: document.getElementById('r-cinsiyet').value,
    telefon: document.getElementById('r-telefon').value.trim(),
    tarih: secilenTarih,
    neden,
    ilacAdi: document.getElementById('r-ilac').value.trim(),
    rapor: document.getElementById('r-rapor').checked,
    form: document.getElementById('r-form').checked,
    not: document.getElementById('r-not').value.trim(),
    yatti: false,
    kaynak: 'randevu_giris', // Değerlendirme tarafında onay gerektirir
    eklenmeTarihi: new Date().toISOString()
  };

  // Lokale kaydet
  randevular.push(yeniRandevu);
  localStorage.setItem('rheum_randevu_giris', JSON.stringify(randevular));

  // Drive'daki pending randevu listesine ekle
  await savePendingRandevu(yeniRandevu);

  // Formu temizle
  document.getElementById('r-hasta-adi').value = '';
  document.getElementById('r-tc').value = '';
  document.getElementById('r-yas').value = '';
  document.getElementById('r-cinsiyet').value = '';
  document.getElementById('r-telefon').value = '';
  document.getElementById('r-neden').value = '';
  document.getElementById('r-ilac').value = '';
  document.getElementById('r-rapor').checked = false;
  document.getElementById('r-form').checked = false;
  document.getElementById('r-not').value = '';

  document.getElementById('randevu-form-card').style.display = 'none';
  showToast('✅ ' + hastaAdi + ' randevusu kaydedildi — değerlendirme onayı bekliyor');
  renderWeek();
}

async function savePendingRandevu(randevu) {
  if (!driveAccessToken) return;
  try {
    // Pending randevu listesi — rheum_randevu_pending.json
    const fileName = 'rheum_randevu_pending.json';
    const searchRes = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${fileName}' and '${driveFolderId}' in parents and trashed=false&fields=files(id)`,
      { headers: { Authorization: 'Bearer ' + driveAccessToken } }
    );
    const searchData = await searchRes.json();
    let pending = [];
    if (searchData.files && searchData.files.length > 0) {
      const cr = await fetch(`https://www.googleapis.com/drive/v3/files/${searchData.files[0].id}?alt=media`,
        { headers: { Authorization: 'Bearer ' + driveAccessToken } });
      pending = await cr.json();
    }
    pending.push(randevu);
    const jsonStr = JSON.stringify(pending);
    const form = new FormData();
    if (searchData.files && searchData.files.length > 0) {
      form.append('metadata', new Blob([JSON.stringify({name:fileName})], {type:'application/json'}));
      form.append('file', new Blob([jsonStr], {type:'application/json'}));
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${searchData.files[0].id}?uploadType=multipart`,
        { method: 'PATCH', headers: { Authorization: 'Bearer ' + driveAccessToken }, body: form });
    } else {
      form.append('metadata', new Blob([JSON.stringify({name:fileName, parents:[driveFolderId]})], {type:'application/json'}));
      form.append('file', new Blob([jsonStr], {type:'application/json'}));
      await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
        { method: 'POST', headers: { Authorization: 'Bearer ' + driveAccessToken }, body: form });
    }
  } catch(e) { console.warn('Pending randevu kayıt hatası:', e); }
}

// ── TAKVİM ──
function localDate(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return y + '-' + m + '-' + day;
}

function getWeekStart(offset) {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  monday.setHours(0,0,0,0);
  return monday;
}

const DAYS = ['Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi','Pazar'];

function renderWeek() {
  const weekStart = getWeekStart(currentWeekOffset);
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
  document.getElementById('week-label').textContent =
    weekStart.toLocaleDateString('tr-TR', {day:'numeric',month:'long'}) + ' — ' +
    weekEnd.toLocaleDateString('tr-TR', {day:'numeric',month:'long',year:'numeric'});

  const container = document.getElementById('week-days');
  const today = localDate(new Date());
  container.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart); d.setDate(weekStart.getDate() + i);
    const dateStr = localDate(d);
    const dayRans = randevular.filter(r => r.tarih === dateStr);
    const isToday = dateStr === today;
    const isSelected = dateStr === secilenTarih;

    const row = document.createElement('div');
    row.className = 'day-row' + (isSelected ? ' selected' : '') + (isToday ? ' today' : '');
    row.onclick = () => selectDay(dateStr, d);

    const names = dayRans.map(r => r.hastaAdi).join(', ');
    row.innerHTML = `
      <div class="day-label">${DAYS[i]} ${d.getDate()}</div>
      <div>
        ${dayRans.length > 0 ? `<span class="badge badge-warn">${dayRans.length} randevu</span>` : ''}
        ${names ? `<div class="day-names">${names}</div>` : '<span class="day-count">Randevu yok</span>'}
      </div>
      <button onclick="event.stopPropagation();openFormForDay('${dateStr}',event)" style="margin-left:auto;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:0.78rem">+ Ekle</button>`;
    container.appendChild(row);
  }
}

function changeWeek(dir) {
  currentWeekOffset += dir;
  renderWeek();
}

function selectDay(dateStr, d) {
  secilenTarih = dateStr;
  renderWeek();
}

function openFormForDay(dateStr, e) {
  if (e) e.stopPropagation();
  secilenTarih = dateStr;
  const d = new Date(dateStr + 'T00:00:00');
  document.getElementById('form-tarih-label').textContent =
    d.toLocaleDateString('tr-TR', {weekday:'long', day:'numeric', month:'long'});
  document.getElementById('randevu-form-card').style.display = 'block';
  document.getElementById('randevu-form-card').scrollIntoView({behavior:'smooth'});
  renderWeek();
}

// ── TOAST ──
function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.borderColor = type === 'error' ? 'var(--danger)' : 'var(--success)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// ── INIT ──
window.onload = () => {
  document.getElementById('sifre-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sifreGiris();
  });
  renderWeek();
};
